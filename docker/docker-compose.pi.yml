# =============================================================================
# docker-compose.pi.yml — Raspberry Pi HIL Edge Gateway
#
# Runs on Pi with physical CAN bus (can0). Physical ECUs (CVC, FZC, RZC, SC)
# are on the CAN bus via STM32/TMS570. Simulated ECUs (BCM, ICU, TCU) run
# as Docker containers. Gateway services bridge CAN → MQTT → AWS IoT Core.
#
# Usage:
#   docker compose -f docker-compose.pi.yml up --build -d
#   docker compose -f docker-compose.pi.yml down
#
# Prerequisites:
#   - Physical CAN interface (can0) configured via Waveshare CAN HAT
#   - AWS certs in ./certs/ (run scripts/aws-iot-setup.sh first)
#   - .env file with AWS_IOT_ENDPOINT (printed by setup script)
# =============================================================================

services:
  # --- Mosquitto MQTT Broker (local only) ---
  mqtt-broker:
    image: eclipse-mosquitto:2
    network_mode: host
    mem_limit: 128m
    cpus: 0.5
    cap_drop: [ALL]
    volumes:
      - ../gateway/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ../gateway/mosquitto/acl:/mosquitto/config/acl:ro
      - ../gateway/mosquitto/passwd:/mosquitto/config/passwd:ro
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h 127.0.0.1 -p 1883 -u taktflow -P taktflow-dev -t '$$SYS/broker/uptime' -C 1 -W 3"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # --- Simulated ECUs (BCM, ICU, TCU on physical can0) ---
  bcm:
    build:
      context: ..
      dockerfile: docker/Dockerfile.vecu
    network_mode: host
    mem_limit: 64m
    cpus: 0.5
    cap_drop: [ALL]
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - CAN_INTERFACE=can0
      - ECU_NAME=bcm
    healthcheck:
      test: ["CMD-SHELL", "ip link show vcan0 2>/dev/null | grep -q UP || ip link show can0 2>/dev/null | grep -q UP"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  icu:
    build:
      context: ..
      dockerfile: docker/Dockerfile.vecu
    network_mode: host
    mem_limit: 64m
    cpus: 0.5
    cap_drop: [ALL]
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - CAN_INTERFACE=can0
      - ECU_NAME=icu
    healthcheck:
      test: ["CMD-SHELL", "ip link show vcan0 2>/dev/null | grep -q UP || ip link show can0 2>/dev/null | grep -q UP"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  tcu:
    build:
      context: ..
      dockerfile: docker/Dockerfile.vecu
    network_mode: host
    mem_limit: 64m
    cpus: 0.5
    cap_drop: [ALL]
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - CAN_INTERFACE=can0
      - ECU_NAME=tcu
    healthcheck:
      test: ["CMD-SHELL", "ip link show vcan0 2>/dev/null | grep -q UP || ip link show can0 2>/dev/null | grep -q UP"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped


  # --- Plant Simulator (virtual vehicle peripherals on physical CAN) ---
  plant-sim:
    build:
      context: ..
      dockerfile: gateway/plant_sim/Dockerfile
    network_mode: host
    mem_limit: 256m
    cpus: 1.0
    cap_drop: [ALL]
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      mqtt-broker:
        condition: service_started
    environment:
      - CAN_CHANNEL=can0
      - DBC_PATH=/app/taktflow_vehicle.dbc
      - MQTT_HOST=localhost
      - MQTT_PORT=1883
      - MQTT_USER=${MQTT_USER:-taktflow}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-taktflow-dev}
    healthcheck:
      test: ["CMD-SHELL", "ip link show vcan0 2>/dev/null | grep -q UP || ip link show can0 2>/dev/null | grep -q UP"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # --- CAN-to-MQTT Gateway ---
  can-gateway:
    build:
      context: ..
      dockerfile: gateway/can_gateway/Dockerfile
    network_mode: host
    mem_limit: 256m
    cpus: 0.5
    cap_drop: [ALL]
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      mqtt-broker:
        condition: service_started
    environment:
      - CAN_CHANNEL=can0
      - DBC_PATH=/app/taktflow_vehicle.dbc
      - MQTT_HOST=localhost
      - MQTT_PORT=1883
      - MQTT_USER=${MQTT_USER:-taktflow}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-taktflow-dev}
    healthcheck:
      test: ["CMD-SHELL", "ip link show vcan0 2>/dev/null | grep -q UP || ip link show can0 2>/dev/null | grep -q UP"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # --- WebSocket Telemetry Bridge ---
  ws-bridge:
    build:
      context: ..
      dockerfile: gateway/ws_bridge/Dockerfile
    network_mode: host
    mem_limit: 256m
    cpus: 0.5
    cap_drop: [ALL]
    read_only: true
    tmpfs: [/tmp]
    depends_on:
      mqtt-broker:
        condition: service_started
    environment:
      - MQTT_HOST=localhost
      - MQTT_PORT=1883
      - MQTT_USER=${MQTT_USER:-taktflow}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-taktflow-dev}
      - WS_PORT=8080
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # --- Caddy Reverse Proxy (for HIL dashboard) ---
  caddy:
    image: caddy:2
    network_mode: host
    mem_limit: 128m
    cpus: 0.25
    cap_drop: [ALL]
    volumes:
      - ../gateway/caddy/Caddyfile.pi:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      ws-bridge:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:80/ || exit 0"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # --- SAP QM Mock API ---
  sap-qm-mock:
    build:
      context: ..
      dockerfile: gateway/sap_qm_mock/Dockerfile
    network_mode: host
    mem_limit: 256m
    cpus: 0.5
    cap_drop: [ALL]
    read_only: true
    tmpfs: [/tmp]
    depends_on:
      mqtt-broker:
        condition: service_started
    environment:
      - MQTT_HOST=localhost
      - MQTT_PORT=1883
      - MQTT_USER=${MQTT_USER:-taktflow}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-taktflow-dev}
      - SAP_PORT=8090
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # --- ML Anomaly Detection (edge inference) ---
  ml-inference:
    build:
      context: ..
      dockerfile: gateway/ml_inference/Dockerfile
    network_mode: host
    mem_limit: 512m
    cpus: 1.0
    cap_drop: [ALL]
    read_only: true
    tmpfs: [/tmp]
    depends_on:
      mqtt-broker:
        condition: service_started
    environment:
      - MQTT_HOST=localhost
      - MQTT_PORT=1883
      - MQTT_USER=${MQTT_USER:-taktflow}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-taktflow-dev}
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f python || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # --- Docker Socket Proxy (filtered API for fault-inject) ---
  docker-proxy:
    image: tecnativa/docker-socket-proxy:0.2
    network_mode: host
    mem_limit: 64m
    cpus: 0.25
    environment:
      CONTAINERS: 1
      POST: 1
      EXEC: 1
      IMAGES: 0
      VOLUMES: 0
      NETWORKS: 0
      SERVICES: 0
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      SECRETS: 0
      SWARM: 0
      SYSTEM: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:2375/_ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # --- Fault Injection API ---
  fault-inject:
    build:
      context: ..
      dockerfile: gateway/fault_inject/Dockerfile
    network_mode: host
    mem_limit: 256m
    cpus: 1.0
    cap_drop: [ALL]
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      mqtt-broker:
        condition: service_started
      docker-proxy:
        condition: service_started
    environment:
      - CAN_CHANNEL=can0
      - FAULT_PORT=8091
      - MQTT_HOST=localhost
      - MQTT_PORT=1883
      - MQTT_USER=${MQTT_USER:-taktflow}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-taktflow-dev}
      - DOCKER_HOST=tcp://127.0.0.1:2375
      - FAULT_API_KEY=${FAULT_API_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8091/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # --- Cloud Connector (local MQTT → AWS IoT Core) ---
  cloud-connector:
    build:
      context: ..
      dockerfile: gateway/cloud_connector/Dockerfile
    network_mode: host
    mem_limit: 128m
    cpus: 0.5
    cap_drop: [ALL]
    read_only: true
    tmpfs: [/tmp]
    depends_on:
      mqtt-broker:
        condition: service_started
    environment:
      - MQTT_HOST=localhost
      - MQTT_PORT=1883
      - MQTT_USER=${MQTT_USER:-taktflow}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-taktflow-dev}
      - AWS_IOT_ENDPOINT=${AWS_IOT_ENDPOINT:-}
      - AWS_IOT_PORT=8883
      - AWS_CERT_DIR=/certs
      - DEVICE_ID=${DEVICE_ID:-taktflow-dev-001}
    volumes:
      - ./certs:/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f python || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
