# =============================================================================
# docker-compose.hil-pi.yml — Minimal vECU station for HIL testing on Pi
#
# Runs ONLY what's needed for HIL tests:
#   - 3 vECUs (BCM, ICU, TCU) on can0
#   - Plant simulator on can0
#   - MQTT broker (mosquitto)
#
# No gateway services (caddy, ws-bridge, cloud-connector, SAP, ML).
# Physical ECUs (CVC, FZC, RZC, SC) are on the CAN bus via hardware.
#
# Prerequisites:
#   sudo ip link set can0 type can bitrate 500000
#   sudo ip link set can0 up
#
# Usage:
#   docker compose -f docker/docker-compose.hil-pi.yml up --build -d
#   docker compose -f docker/docker-compose.hil-pi.yml down
# =============================================================================

services:
  # --- MQTT Broker ---
  mqtt:
    image: eclipse-mosquitto:2
    network_mode: host
    mem_limit: 128m
    cpus: 0.5
    cap_drop: [ALL]
    volumes:
      - ../gateway/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ../gateway/mosquitto/acl:/mosquitto/config/acl:ro
      - ../gateway/mosquitto/passwd:/mosquitto/config/passwd:ro
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h 127.0.0.1 -p 1883 -u taktflow -P taktflow-dev -t '$$SYS/broker/uptime' -C 1 -W 3"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # --- Plant Simulator ---
  plant-sim:
    build:
      context: ..
      dockerfile: docker/Dockerfile.plant-sim
    network_mode: host
    mem_limit: 256m
    cpus: 1.0
    cap_drop: [ALL]
    cap_add: [NET_ADMIN, NET_RAW]
    depends_on:
      mqtt:
        condition: service_started
    environment:
      - CAN_CHANNEL=can0
      - DBC_PATH=/app/gateway/taktflow_vehicle.dbc
      - MQTT_HOST=localhost
      - MQTT_PORT=1883
      - MQTT_USER=${MQTT_USER:-taktflow}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-taktflow-dev}
    healthcheck:
      test: ["CMD-SHELL", "ip link show can0 2>/dev/null | grep -q UP"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # --- vECUs (BCM, ICU, TCU on can0 — no bridge needed) ---
  bcm:
    build:
      context: ..
      dockerfile: docker/Dockerfile.vecu
    network_mode: host
    mem_limit: 64m
    cpus: 0.5
    cap_drop: [ALL]
    cap_add: [NET_ADMIN, NET_RAW]
    environment:
      - CAN_INTERFACE=can0
      - ECU_NAME=bcm
    healthcheck:
      test: ["CMD-SHELL", "ip link show can0 2>/dev/null | grep -q UP"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  icu:
    build:
      context: ..
      dockerfile: docker/Dockerfile.vecu
    network_mode: host
    mem_limit: 64m
    cpus: 0.5
    cap_drop: [ALL]
    cap_add: [NET_ADMIN, NET_RAW]
    environment:
      - CAN_INTERFACE=can0
      - ECU_NAME=icu
    healthcheck:
      test: ["CMD-SHELL", "ip link show can0 2>/dev/null | grep -q UP"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  tcu:
    build:
      context: ..
      dockerfile: docker/Dockerfile.vecu
    network_mode: host
    mem_limit: 64m
    cpus: 0.5
    cap_drop: [ALL]
    cap_add: [NET_ADMIN, NET_RAW]
    environment:
      - CAN_INTERFACE=can0
      - ECU_NAME=tcu
    healthcheck:
      test: ["CMD-SHELL", "ip link show can0 2>/dev/null | grep -q UP"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
