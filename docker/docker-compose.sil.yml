# SIL Docker Compose — Full 7-ECU + plant-sim + gateway simulation
# Uses bridge networking (no host CAN needed)
# Usage: docker compose -f docker/docker-compose.sil.yml up

networks:
  canbus:
    driver: bridge

services:
  # --- MQTT Broker ---
  mqtt:
    image: eclipse-mosquitto:2
    networks: [canbus]
    mem_limit: 128m
    cpus: 0.5
    cap_drop: [ALL]
    volumes:
      - ../gateway/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ../gateway/mosquitto/acl:/mosquitto/config/acl:ro
      - ../gateway/mosquitto/passwd:/mosquitto/config/passwd:ro
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h 127.0.0.1 -p 1883 -u taktflow -P taktflow-dev -t '$$SYS/broker/uptime' -C 1 -W 3"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  # Central Vehicle Controller
  cvc:
    build:
      context: ..
      dockerfile: docker/ecu/Dockerfile.ecu
      args:
        ECU_NAME: cvc
    networks: [canbus]
    mem_limit: 64m
    cpus: 0.5
    cap_drop: [ALL]
    cap_add: [NET_ADMIN]

  # Front Zone Controller
  fzc:
    build:
      context: ..
      dockerfile: docker/ecu/Dockerfile.ecu
      args:
        ECU_NAME: fzc
    networks: [canbus]
    mem_limit: 64m
    cpus: 0.5
    cap_drop: [ALL]
    cap_add: [NET_ADMIN]

  # Rear Zone Controller
  rzc:
    build:
      context: ..
      dockerfile: docker/ecu/Dockerfile.ecu
      args:
        ECU_NAME: rzc
    networks: [canbus]
    mem_limit: 64m
    cpus: 0.5
    cap_drop: [ALL]
    cap_add: [NET_ADMIN]

  # Safety Controller (POSIX simulation)
  sc:
    build:
      context: ..
      dockerfile: docker/ecu/Dockerfile.ecu
      args:
        ECU_NAME: sc
    networks: [canbus]
    mem_limit: 64m
    cpus: 0.5
    cap_drop: [ALL]
    cap_add: [NET_ADMIN]

  # Body Control Module
  bcm:
    build:
      context: ..
      dockerfile: docker/ecu/Dockerfile.ecu
      args:
        ECU_NAME: bcm
    networks: [canbus]
    mem_limit: 64m
    cpus: 0.5
    cap_drop: [ALL]
    cap_add: [NET_ADMIN]

  # Instrument Cluster Unit
  icu:
    build:
      context: ..
      dockerfile: docker/ecu/Dockerfile.ecu
      args:
        ECU_NAME: icu
    networks: [canbus]
    mem_limit: 64m
    cpus: 0.5
    cap_drop: [ALL]
    cap_add: [NET_ADMIN]

  # Transmission Control Unit
  tcu:
    build:
      context: ..
      dockerfile: docker/ecu/Dockerfile.ecu
      args:
        ECU_NAME: tcu
    networks: [canbus]
    mem_limit: 64m
    cpus: 0.5
    cap_drop: [ALL]
    cap_add: [NET_ADMIN]

  # Plant simulation (vehicle dynamics model)
  plant-sim:
    build:
      context: ..
      dockerfile: gateway/plant_sim_py/Dockerfile
    networks: [canbus]
    mem_limit: 256m
    cpus: 1.0
    cap_drop: [ALL]
    cap_add: [NET_ADMIN]
    environment:
      - MQTT_HOST=mqtt
      - MQTT_PORT=1883
      - MQTT_USER=${MQTT_USER:-taktflow}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-taktflow-dev}
    depends_on:
      mqtt:
        condition: service_started

  # CAN gateway (CAN <-> MQTT bridge)
  gateway:
    build:
      context: ..
      dockerfile: gateway/can_gateway/Dockerfile
    networks: [canbus]
    mem_limit: 256m
    cpus: 0.5
    cap_drop: [ALL]
    cap_add: [NET_ADMIN]
    environment:
      - MQTT_HOST=mqtt
      - MQTT_PORT=1883
      - MQTT_USER=${MQTT_USER:-taktflow}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-taktflow-dev}
    depends_on:
      mqtt:
        condition: service_started
