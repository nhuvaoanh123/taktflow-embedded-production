# =============================================================================
# docker-compose.yml — Full SIL Demo Platform
#
# 7 simulated ECUs + plant simulator + MQTT + CAN gateway + WebSocket bridge
# + Caddy reverse proxy + SAP QM mock + ML inference + fault injection
#
# Usage:
#   docker compose up --build        Start all services (foreground)
#   docker compose up --build -d     Start all services (background)
#   docker compose down              Stop all services
#   docker compose logs -f cvc       Follow CVC logs
#
# Prerequisites (on VPS host, one-time):
#   sudo modprobe vcan
#   echo vcan | sudo tee /etc/modules-load.d/vcan.conf   # persist across reboots
# =============================================================================

services:
  # --- vcan0 setup (runs once, exits) ---
  can-setup:
    build:
      context: ..
      dockerfile: docker/Dockerfile.can-setup
    command: >
      /bin/sh -c "
        modprobe vcan 2>/dev/null || true;
        if ip link show vcan0 > /dev/null 2>&1; then
          ip link set vcan0 up;
          echo '[can-setup] vcan0 already existed — set UP';
        elif ip link add vcan0 type vcan; then
          ip link set vcan0 up;
          echo '[can-setup] created vcan0 — set UP';
        else
          echo '[can-setup] ERROR: cannot create vcan0 — vcan module not loaded';
          echo '[can-setup] Run on VPS host:  sudo modprobe vcan';
          echo '[can-setup] Persist:  echo vcan | sudo tee /etc/modules-load.d/vcan.conf';
          exit 1;
        fi;
        ip -d link show vcan0
      "
    cap_drop: [ALL]
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_MODULE
    volumes:
      - /lib/modules:/lib/modules:ro
    network_mode: host
    mem_limit: 64m
    cpus: 0.25
    restart: "no"

  # --- Central Vehicle Computer ---
  cvc:
    build:
      context: ..
      dockerfile: docker/Dockerfile.vecu
    network_mode: host
    mem_limit: 64m
    cpus: 0.5
    cap_drop: [ALL]
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      can-setup:
        condition: service_completed_successfully
    environment:
      - CAN_INTERFACE=vcan0
      - ECU_NAME=cvc
      - SPI_PEDAL_UDP_PORT=9100
      - SIL_TIME_SCALE=${SIL_TIME_SCALE:-1}
    volumes:
      - nvm_cvc:/tmp
    healthcheck:
      test: ["CMD-SHELL", "ip link show vcan0 2>/dev/null | grep -q UP || ip link show can0 2>/dev/null | grep -q UP"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # --- Front Zone Controller ---
  fzc:
    build:
      context: ..
      dockerfile: docker/Dockerfile.vecu
    network_mode: host
    mem_limit: 64m
    cpus: 0.5
    cap_drop: [ALL]
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      can-setup:
        condition: service_completed_successfully
    environment:
      - CAN_INTERFACE=vcan0
      - ECU_NAME=fzc
      - SIL_TIME_SCALE=${SIL_TIME_SCALE:-1}
    volumes:
      - nvm_fzc:/tmp
    healthcheck:
      test: ["CMD-SHELL", "ip link show vcan0 2>/dev/null | grep -q UP || ip link show can0 2>/dev/null | grep -q UP"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # --- Rear Zone Controller ---
  rzc:
    build:
      context: ..
      dockerfile: docker/Dockerfile.vecu
    network_mode: host
    mem_limit: 64m
    cpus: 0.5
    cap_drop: [ALL]
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      can-setup:
        condition: service_completed_successfully
    environment:
      - CAN_INTERFACE=vcan0
      - ECU_NAME=rzc
      - SIL_TIME_SCALE=${SIL_TIME_SCALE:-1}
    volumes:
      - nvm_rzc:/tmp
    healthcheck:
      test: ["CMD-SHELL", "ip link show vcan0 2>/dev/null | grep -q UP || ip link show can0 2>/dev/null | grep -q UP"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # --- Safety Controller ---
  sc:
    build:
      context: ..
      dockerfile: docker/Dockerfile.vecu
    network_mode: host
    mem_limit: 64m
    cpus: 0.5
    cap_drop: [ALL]
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      can-setup:
        condition: service_completed_successfully
    environment:
      - CAN_INTERFACE=vcan0
      - ECU_NAME=sc
      - SIL_TIME_SCALE=${SIL_TIME_SCALE:-1}
    healthcheck:
      test: ["CMD-SHELL", "ip link show vcan0 2>/dev/null | grep -q UP || ip link show can0 2>/dev/null | grep -q UP"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # --- Body Control Module ---
  bcm:
    build:
      context: ..
      dockerfile: docker/Dockerfile.vecu
    network_mode: host
    mem_limit: 64m
    cpus: 0.5
    cap_drop: [ALL]
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      can-setup:
        condition: service_completed_successfully
    environment:
      - CAN_INTERFACE=vcan0
      - ECU_NAME=bcm
      - SIL_TIME_SCALE=${SIL_TIME_SCALE:-1}
    healthcheck:
      test: ["CMD-SHELL", "ip link show vcan0 2>/dev/null | grep -q UP || ip link show can0 2>/dev/null | grep -q UP"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # --- Instrument Cluster Unit ---
  icu:
    build:
      context: ..
      dockerfile: docker/Dockerfile.vecu
    network_mode: host
    mem_limit: 64m
    cpus: 0.5
    cap_drop: [ALL]
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      can-setup:
        condition: service_completed_successfully
    environment:
      - CAN_INTERFACE=vcan0
      - ECU_NAME=icu
      - SIL_TIME_SCALE=${SIL_TIME_SCALE:-1}
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD-SHELL", "ip link show vcan0 2>/dev/null | grep -q UP || ip link show can0 2>/dev/null | grep -q UP"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # --- Telematics Control Unit ---
  tcu:
    build:
      context: ..
      dockerfile: docker/Dockerfile.vecu
    network_mode: host
    mem_limit: 64m
    cpus: 0.5
    cap_drop: [ALL]
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      can-setup:
        condition: service_completed_successfully
    environment:
      - CAN_INTERFACE=vcan0
      - ECU_NAME=tcu
      - SIL_TIME_SCALE=${SIL_TIME_SCALE:-1}
    healthcheck:
      test: ["CMD-SHELL", "ip link show vcan0 2>/dev/null | grep -q UP || ip link show can0 2>/dev/null | grep -q UP"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # --- Plant Physics Simulator ---
  plant-sim:
    build:
      context: ..
      dockerfile: gateway/plant_sim_py/Dockerfile
    network_mode: host
    mem_limit: 256m
    cpus: 1.0
    cap_drop: [ALL]
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      can-setup:
        condition: service_completed_successfully
      mqtt-broker:
        condition: service_started
    environment:
      - CAN_CHANNEL=vcan0
      - DBC_PATH=/app/taktflow_vehicle.dbc
      - MQTT_HOST=localhost
      - MQTT_PORT=1883
      - MQTT_USER=${MQTT_USER:-taktflow}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-taktflow-dev}
      - SIL_TIME_SCALE=${SIL_TIME_SCALE:-1}
    healthcheck:
      test: ["CMD-SHELL", "ip link show vcan0 2>/dev/null | grep -q UP || ip link show can0 2>/dev/null | grep -q UP"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # --- Mosquitto MQTT Broker (internal only) ---
  mqtt-broker:
    image: eclipse-mosquitto:2
    network_mode: host
    mem_limit: 128m
    cpus: 0.5
    cap_drop: [ALL]
    cap_add: [SETGID, SETUID, DAC_OVERRIDE]
    volumes:
      - ../gateway/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ../gateway/mosquitto/acl:/mosquitto/config/acl:ro
      - ../gateway/mosquitto/passwd:/mosquitto/config/passwd:ro
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h 127.0.0.1 -p 1883 -u taktflow -P taktflow-dev -t '$$SYS/broker/uptime' -C 1 -W 3"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # --- CAN-to-MQTT Gateway ---
  can-gateway:
    build:
      context: ..
      dockerfile: gateway/can_gateway/Dockerfile
    network_mode: host
    mem_limit: 256m
    cpus: 0.5
    cap_drop: [ALL]
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      can-setup:
        condition: service_completed_successfully
      mqtt-broker:
        condition: service_started
      sap-qm-mock:
        condition: service_started
    environment:
      - CAN_CHANNEL=vcan0
      - DBC_PATH=/app/taktflow_vehicle.dbc
      - MQTT_HOST=localhost
      - MQTT_PORT=1883
      - MQTT_USER=${MQTT_USER:-taktflow}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-taktflow-dev}
      - SAP_QM_API_URL=http://localhost:8090
    healthcheck:
      test: ["CMD-SHELL", "ip link show vcan0 2>/dev/null | grep -q UP || ip link show can0 2>/dev/null | grep -q UP"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # --- WebSocket Telemetry Bridge ---
  ws-bridge:
    build:
      context: ..
      dockerfile: gateway/ws_bridge/Dockerfile
    network_mode: host
    mem_limit: 256m
    cpus: 0.5
    cap_drop: [ALL]
    read_only: true
    tmpfs: [/tmp]
    depends_on:
      mqtt-broker:
        condition: service_started
    environment:
      - MQTT_HOST=localhost
      - MQTT_PORT=1883
      - MQTT_USER=${MQTT_USER:-taktflow}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-taktflow-dev}
      - WS_PORT=8080
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # --- Caddy Reverse Proxy (auto-TLS) ---
  caddy:
    image: caddy:2
    network_mode: host
    mem_limit: 128m
    cpus: 0.25
    cap_drop: [ALL]
    cap_add: [SETGID, SETUID, NET_BIND_SERVICE]
    volumes:
      - ../gateway/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      ws-bridge:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:80/ || exit 0"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # --- SAP QM Mock API ---
  sap-qm-mock:
    build:
      context: ..
      dockerfile: gateway/sap_qm_mock/Dockerfile
    network_mode: host
    mem_limit: 256m
    cpus: 0.5
    cap_drop: [ALL]
    depends_on:
      mqtt-broker:
        condition: service_started
    environment:
      - MQTT_HOST=localhost
      - MQTT_PORT=1883
      - MQTT_USER=${MQTT_USER:-taktflow}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-taktflow-dev}
      - SAP_PORT=8090
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # --- ML Anomaly Detection ---
  ml-inference:
    build:
      context: ..
      dockerfile: gateway/ml_inference/Dockerfile
    network_mode: host
    mem_limit: 512m
    cpus: 1.0
    cap_drop: [ALL]
    depends_on:
      mqtt-broker:
        condition: service_started
    environment:
      - MQTT_HOST=localhost
      - MQTT_PORT=1883
      - MQTT_USER=${MQTT_USER:-taktflow}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-taktflow-dev}
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f python || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # --- Docker Socket Proxy (filtered API for fault-inject) ---
  docker-proxy:
    image: tecnativa/docker-socket-proxy:0.2
    network_mode: host
    mem_limit: 64m
    cpus: 0.25
    environment:
      CONTAINERS: 1       # allow container list/start/stop
      POST: 1             # allow POST (start/stop/exec)
      EXEC: 1             # allow exec (NvM file cleanup)
      IMAGES: 0
      VOLUMES: 0
      NETWORKS: 0
      SERVICES: 0
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      SECRETS: 0
      SWARM: 0
      SYSTEM: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:2375/_ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # --- Fault Injection API ---
  fault-inject:
    build:
      context: ..
      dockerfile: gateway/fault_inject/Dockerfile
    network_mode: host
    mem_limit: 256m
    cpus: 1.0
    cap_drop: [ALL]
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      can-setup:
        condition: service_completed_successfully
      mqtt-broker:
        condition: service_started
      docker-proxy:
        condition: service_started
    environment:
      - CAN_CHANNEL=vcan0
      - FAULT_PORT=8091
      - MQTT_HOST=localhost
      - MQTT_PORT=1883
      - MQTT_USER=${MQTT_USER:-taktflow}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-taktflow-dev}
      - SIL_TIME_SCALE=${SIL_TIME_SCALE:-1}
      - DOCKER_HOST=tcp://127.0.0.1:2375
      - FAULT_API_KEY=${FAULT_API_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8091/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  nvm_cvc:
  nvm_fzc:
  nvm_rzc:
