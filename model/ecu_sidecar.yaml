# ============================================================
# Sidecar config — non-ARXML data (DTCs, enums, thresholds, scheduling)
# ============================================================

# Routing overrides for multi-sender messages (DBC allows only one sender)
message_routing:
  DTC_Broadcast:
    additional_tx_ecus: [fzc, rzc, sc, bcm, icu, tcu]

# UDS diagnostic addressing per ECU
# uds_rx_pdu_name: DBC message name for physical UDS request TO this ECU
# uds_tx_pdu_name: DBC message name for UDS response FROM this ECU
# These route through CanTp (ISO-TP) instead of Com (direct signal)

ecus:
  cvc:
    uds_rx_pdu_name: "UDS_Phys_Req_CVC"
    uds_tx_pdu_name: "UDS_Resp_CVC"
    dtc_events:
      CVC_DTC_PEDAL_PLAUSIBILITY: 0
      CVC_DTC_PEDAL_STUCK: 1
      CVC_DTC_PEDAL_RANGE: 2
      CVC_DTC_COMM_FZC_TIMEOUT: 3
      CVC_DTC_COMM_RZC_TIMEOUT: 4
      CVC_DTC_COMM_SC_TIMEOUT: 5
      CVC_DTC_VEHICLE_STATE: 6
      CVC_DTC_ESTOP_FAULT: 7
      CVC_DTC_MOTOR_OVERCURRENT: 8
      CVC_DTC_MOTOR_OVERSPEED: 9
      CVC_DTC_BATTERY_LOW: 10
      CVC_DTC_BATTERY_CRITICAL: 11
      CVC_DTC_STEERING_FAULT: 12
      CVC_DTC_BRAKE_FAULT: 13
      CVC_DTC_LIDAR_FAULT: 14
      CVC_DTC_CAN_BUS_OFF: 15
      CVC_DTC_SELF_TEST_FAIL: 16
      CVC_DTC_WATCHDOG_FAULT: 17
      CVC_DTC_SC_RELAY_KILL: 18

    # E2E DataIDs — MUST match DBC BA_ "E2E_DataID" attributes
    e2e_data_ids:
      CVC_E2E_ESTOP_DATA_ID: 0x01        # CAN 0x001 → DBC DataID 1
      CVC_E2E_HEARTBEAT_DATA_ID: 0x02    # CAN 0x010 → DBC DataID 2
      CVC_E2E_VEHICLE_STATE_DATA_ID: 0x05 # CAN 0x100 → DBC DataID 5
      CVC_E2E_TORQUE_DATA_ID: 0x06       # CAN 0x101 → DBC DataID 6
      CVC_E2E_STEER_CMD_DATA_ID: 0x07    # CAN 0x102 → DBC DataID 7
      CVC_E2E_BRAKE_CMD_DATA_ID: 0x08    # CAN 0x103 → DBC DataID 8

    # Explicit PDU name → E2E data ID mapping — MUST match DBC BA_ "E2E_DataID"
    # NOTE: e2e_source=dbc in project.yaml overrides these, but keep in sync
    pdu_e2e_map:
      EStop_Broadcast: 0x01    # CAN 0x001
      CVC_Heartbeat: 0x02     # CAN 0x010
      Vehicle_State: 0x05     # CAN 0x100
      Torque_Request: 0x06    # CAN 0x101
      Steer_Command: 0x07     # CAN 0x102
      Brake_Command: 0x08     # CAN 0x103

    # E2E failure → DTC mapping: RX PDU name → DTC event name
    e2e_dem_map:
      FZC_Heartbeat: CVC_DTC_COMM_FZC_TIMEOUT
      RZC_Heartbeat: CVC_DTC_COMM_RZC_TIMEOUT
      SC_Status: CVC_DTC_COMM_SC_TIMEOUT

    enums:
      CVC_STATE_INIT: 0
      CVC_STATE_RUN: 1
      CVC_STATE_DEGRADED: 2
      CVC_STATE_LIMP: 3
      CVC_STATE_SAFE_STOP: 4
      CVC_STATE_SHUTDOWN: 5
      CVC_STATE_COUNT: 6
      CVC_COMM_OK: 0
      CVC_COMM_TIMEOUT: 1
      CVC_COMM_ERROR: 2

    thresholds:
      CVC_INIT_HOLD_CYCLES: 500
      CVC_RTE_PERIOD_MS: 10
      CVC_COMM_TIMEOUT_MS: 100
      CVC_PEDAL_PLAUS_THRESHOLD: 819
      CVC_PEDAL_STUCK_THRESHOLD: 10
      CVC_FAULT_CONFIRM_THRESHOLD: 3
      CVC_MOTOR_OVERCURRENT_LIMIT: 4000
      CVC_MOTOR_OVERSPEED_LIMIT: 6000
      CVC_BATTERY_LOW_THRESHOLD: 2200
      CVC_BATTERY_CRITICAL_THRESHOLD: 2000

    runnables:
      Can_MainFunction_Read:
        period_ms: 1
        priority: 9
        wdgm_se_id: 0xFF
      Com_MainFunction_Rx:
        period_ms: 10
        priority: 8
        wdgm_se_id: 0xFF
      Swc_EStop_MainFunction:
        period_ms: 10
        priority: 7
        wdgm_se_id: 2
      Swc_Pedal_MainFunction:
        period_ms: 10
        priority: 6
        wdgm_se_id: 0
      Swc_VehicleState_MainFunction:
        period_ms: 10
        priority: 5
        wdgm_se_id: 1
      Swc_Heartbeat_MainFunction:
        period_ms: 50
        priority: 4
        wdgm_se_id: 3
      Swc_Dashboard_MainFunction:
        period_ms: 10
        priority: 3
        wdgm_se_id: 4
      Com_MainFunction_Tx:
        period_ms: 10
        priority: 2
        wdgm_se_id: 0xFF
      Can_MainFunction_BusOff:
        period_ms: 10
        priority: 1
        wdgm_se_id: 0xFF

  fzc:
    uds_rx_pdu_name: "UDS_Phys_Req_FZC"
    uds_tx_pdu_name: "UDS_Resp_FZC"
    dtc_events:
      FZC_DTC_STEER_PLAUSIBILITY: 0
      FZC_DTC_STEER_RANGE: 1
      FZC_DTC_STEER_RATE: 2
      FZC_DTC_STEER_TIMEOUT: 3
      FZC_DTC_STEER_SPI_FAIL: 4
      FZC_DTC_BRAKE_FAULT: 5
      FZC_DTC_BRAKE_TIMEOUT: 6
      FZC_DTC_BRAKE_PWM_FAIL: 7
      FZC_DTC_LIDAR_TIMEOUT: 8
      FZC_DTC_LIDAR_CHECKSUM: 9
      FZC_DTC_LIDAR_STUCK: 10
      FZC_DTC_LIDAR_SIGNAL_LOW: 11
      FZC_DTC_CAN_BUS_OFF: 12
      FZC_DTC_SELF_TEST_FAIL: 13
      FZC_DTC_WATCHDOG_FAIL: 14
      FZC_DTC_BRAKE_OSCILLATION: 15

    # E2E DataIDs — MUST match DBC BA_ "E2E_DataID" attributes
    e2e_data_ids:
      FZC_E2E_HEARTBEAT_DATA_ID: 0x03     # CAN 0x011 → DBC DataID 3
      FZC_E2E_STEER_STATUS_DATA_ID: 0x09  # CAN 0x200 → DBC DataID 9
      FZC_E2E_BRAKE_STATUS_DATA_ID: 0x0A  # CAN 0x201 → DBC DataID 10
      FZC_E2E_LIDAR_DATA_ID: 0x0D         # CAN 0x220 → DBC DataID 13
      FZC_E2E_ESTOP_DATA_ID: 0x01         # CAN 0x001 → DBC DataID 1
      FZC_E2E_VEHSTATE_DATA_ID: 0x05      # CAN 0x100 → DBC DataID 5
      FZC_E2E_STEER_CMD_DATA_ID: 0x07     # CAN 0x102 → DBC DataID 7
      FZC_E2E_BRAKE_CMD_DATA_ID: 0x08     # CAN 0x103 → DBC DataID 8

    pdu_e2e_map:
      FZC_Heartbeat: 0x03      # CAN 0x011
      Steering_Status: 0x09    # CAN 0x200
      Brake_Status: 0x0A       # CAN 0x201
      Steer_Command: 0x07      # CAN 0x102
      Brake_Command: 0x08      # CAN 0x103
      Brake_Fault: 0x0B        # CAN 0x210
      Motor_Cutoff_Req: 0x0C   # CAN 0x211
      Lidar_Distance: 0x0D     # CAN 0x220

    e2e_dem_map:
      CVC_Heartbeat: FZC_DTC_CAN_BUS_OFF
      Vehicle_State: FZC_DTC_CAN_BUS_OFF

    enums:
      FZC_STATE_INIT: 0
      FZC_STATE_RUN: 1
      FZC_STATE_DEGRADED: 2
      FZC_STATE_LIMP: 3
      FZC_STATE_SAFE_STOP: 4
      FZC_STATE_SHUTDOWN: 5
      FZC_STATE_COUNT: 6

    rte_internal_signals:
      - BUZZER_PATTERN
      - STEER_PWM_DISABLE
      - BRAKE_PWM_DISABLE
      - SELF_TEST_RESULT
      - SAFETY_STATUS
      - HEARTBEAT_ALIVE
      - FAULT_MASK

    rte_aliases:
      FZC_SIG_STEER_CMD:          Steer_Command_SteerAngleCmd
      FZC_SIG_STEER_ANGLE:        Steering_Status_ActualAngle
      FZC_SIG_STEER_FAULT:        Steering_Status_SteerFaultStatus
      FZC_SIG_BRAKE_CMD:          Brake_Command_BrakeForceCmd
      FZC_SIG_BRAKE_POS:          Brake_Status_BrakePosition
      FZC_SIG_BRAKE_FAULT:        Brake_Status_BrakeFaultStatus
      FZC_SIG_LIDAR_DIST:         Lidar_Distance_Range_cm
      FZC_SIG_LIDAR_SIGNAL:       Lidar_Distance_SignalStrength
      FZC_SIG_LIDAR_ZONE:         Lidar_Distance_ObstacleZone
      FZC_SIG_LIDAR_FAULT:        Lidar_Distance_SensorStatus
      FZC_SIG_VEHICLE_STATE:      Vehicle_State_Mode
      FZC_SIG_ESTOP_ACTIVE:       EStop_Broadcast_Active
      FZC_SIG_MOTOR_CUTOFF:       Motor_Cutoff_Req_RequestType

    thresholds:
      FZC_RTE_PERIOD_MS: 10
      FZC_COMM_TIMEOUT: 100
      FZC_STEER_MAX_ANGLE: 450
      FZC_STEER_DEADBAND: 5
      FZC_BRAKE_MAX_PRESSURE: 1000
      FZC_LIDAR_MAX_RANGE: 4000
      FZC_LIDAR_MIN_RANGE: 50

    runnables:
      Can_MainFunction_Read:
        period_ms: 10
        priority: 14
        wdgm_se_id: 0xFF
      Com_MainFunction_Rx:
        period_ms: 10
        priority: 13
        wdgm_se_id: 0xFF
      # Swc_FzcCom_Receive: REMOVED — RX auto-push handles all signal bridging
      Swc_FzcSensorFeeder_MainFunction:
        period_ms: 10
        priority: 11
        wdgm_se_id: 0xFF
      Swc_Steering_MainFunction:
        period_ms: 10
        priority: 10
        wdgm_se_id: 0
      Swc_Brake_MainFunction:
        period_ms: 10
        priority: 9
        wdgm_se_id: 1
      Swc_Lidar_MainFunction:
        period_ms: 10
        priority: 8
        wdgm_se_id: 2
      Swc_Heartbeat_MainFunction:
        period_ms: 50
        priority: 7
        wdgm_se_id: 3
      Swc_FzcSafety_MainFunction:
        period_ms: 10
        priority: 6
        wdgm_se_id: 4
      Swc_Buzzer_MainFunction:
        period_ms: 10
        priority: 5
        wdgm_se_id: 5
      Swc_FzcCanMonitor_Check:
        period_ms: 10
        priority: 4
        wdgm_se_id: 0xFF
      # Swc_FzcCom_TransmitSchedule: REMOVED — TX auto-pull handles all signal packing
      Com_MainFunction_Tx:
        period_ms: 10
        priority: 2
        wdgm_se_id: 0xFF
      Can_MainFunction_BusOff:
        period_ms: 10
        priority: 1
        wdgm_se_id: 0xFF

  rzc:
    uds_rx_pdu_name: "UDS_Phys_Req_RZC"
    uds_tx_pdu_name: "UDS_Resp_RZC"
    dtc_events:
      RZC_DTC_OVERCURRENT: 0
      RZC_DTC_OVERTEMP: 1
      RZC_DTC_STALL: 2
      RZC_DTC_DIRECTION: 3
      RZC_DTC_SHOOT_THROUGH: 4
      RZC_DTC_CAN_BUS_OFF: 5
      RZC_DTC_CMD_TIMEOUT: 6
      RZC_DTC_SELF_TEST_FAIL: 7
      RZC_DTC_WATCHDOG_FAIL: 8
      RZC_DTC_BATTERY: 9
      RZC_DTC_ENCODER: 10
      RZC_DTC_ZERO_CAL: 11

    # E2E DataIDs — MUST match DBC BA_ "E2E_DataID" attributes
    e2e_data_ids:
      RZC_E2E_HEARTBEAT_DATA_ID: 0x04     # CAN 0x012 → DBC DataID 4
      RZC_E2E_MOTOR_STATUS_DATA_ID: 0x0E  # CAN 0x300 → DBC DataID 14
      RZC_E2E_MOTOR_CURRENT_DATA_ID: 0x0F # CAN 0x301 → DBC DataID 15
      RZC_E2E_MOTOR_TEMP_DATA_ID: 0x00    # CAN 0x302 → DBC DataID 0
      RZC_E2E_BATTERY_DATA_ID: 0x13       # CAN 0x303 → DBC DataID 19
      RZC_E2E_ESTOP_DATA_ID: 0x01         # CAN 0x001 → DBC DataID 1
      RZC_E2E_VEHSTATE_DATA_ID: 0x05      # CAN 0x100 → DBC DataID 5

    pdu_e2e_map:
      RZC_Heartbeat: 0x04       # CAN 0x012
      Motor_Status: 0x0E        # CAN 0x300
      Motor_Current: 0x0F       # CAN 0x301
      Torque_Request: 0x06      # CAN 0x101
      Motor_Temperature: 0x00   # CAN 0x302
      Battery_Status: 0x13      # CAN 0x303
      Encoder_Status: 0x27      # no DBC entry — keep as-is

    e2e_dem_map:
      CVC_Heartbeat: RZC_DTC_CAN_BUS_OFF
      Vehicle_State: RZC_DTC_CAN_BUS_OFF
      Torque_Request: RZC_DTC_CAN_BUS_OFF

    enums:
      RZC_STATE_INIT: 0
      RZC_STATE_RUN: 1
      RZC_STATE_DEGRADED: 2
      RZC_STATE_LIMP: 3
      RZC_STATE_SAFE_STOP: 4
      RZC_STATE_SHUTDOWN: 5
      RZC_STATE_COUNT: 6

    thresholds:
      RZC_RTE_PERIOD_MS: 10  # ASIL B — motor overcurrent needs <10ms detection
      RZC_COMM_TIMEOUT: 100
      RZC_MOTOR_OVERCURRENT_LIMIT: 4000
      RZC_MOTOR_OVERSPEED_LIMIT: 6000
      RZC_MOTOR_OVERTEMP_LIMIT: 850
      RZC_BATTERY_LOW_MV: 2200
      RZC_BATTERY_CRITICAL_MV: 2000
      RZC_ENCODER_TIMEOUT: 50

    # ECU-internal RTE signals (not on CAN, SWC-to-SWC only).
    # Codegen emits #define RZC_SIG_<NAME> with indices after DBC signals.
    rte_internal_signals:
      - ENCODER_SPEED
      - ENCODER_DIR
      - ENCODER_STALL
      - TEMP_FAULT

    # RTE signal aliases — maps application-level names to DBC signal names.
    # Codegen emits: #define RZC_SIG_BATTERY_MV  RZC_SIG_BATTERY_STATUS_BATTERY_VOLTAGE_M_V
    rte_aliases:
      RZC_SIG_TORQUE_CMD:       Torque_Request_Command_pct
      RZC_SIG_TORQUE_ECHO:      Motor_Current_TorqueEcho
      RZC_SIG_MOTOR_SPEED:      Motor_Status_MotorSpeed_RPM
      RZC_SIG_MOTOR_DIR:        Motor_Status_MotorDirection
      RZC_SIG_MOTOR_ENABLE:     Motor_Status_MotorEnable
      RZC_SIG_MOTOR_FAULT:      Motor_Status_MotorFaultStatus
      RZC_SIG_CURRENT_MA:       Motor_Current_Phase_mA
      RZC_SIG_OVERCURRENT:      Motor_Current_OvercurrentFlag
      RZC_SIG_TEMP1_DC:         Motor_Temperature_WindingTemp1_C
      RZC_SIG_TEMP2_DC:         Motor_Temperature_WindingTemp2_C
      RZC_SIG_DERATING_PCT:     Motor_Temperature_DeratingPercent
      RZC_SIG_BATTERY_MV:       Battery_Status_BatteryVoltage_mV
      RZC_SIG_BATTERY_STATUS:   Battery_Status_Level
      RZC_SIG_VEHICLE_STATE:    Vehicle_State_Mode
      RZC_SIG_ESTOP_ACTIVE:     EStop_Broadcast_Active
      RZC_SIG_FAULT_MASK:       Vehicle_State_FaultMask
      RZC_SIG_SELF_TEST_RESULT: RZC_Heartbeat_FaultStatus
      RZC_SIG_HEARTBEAT_ALIVE:  RZC_Heartbeat_E2E_AliveCounter
      RZC_SIG_SAFETY_STATUS:    SC_Status_RelayEnergized
      RZC_SIG_CMD_TIMEOUT:      Torque_Request_PedalFault
      RZC_SIG_BATTERY_SOC:      Battery_Status_Level

    runnables:
      Swc_CurrentMonitor_MainFunction:
        period_ms: 1
        priority: 11
        wdgm_se_id: 0
      Swc_Motor_MainFunction:
        period_ms: 10
        priority: 10
        wdgm_se_id: 1
      Swc_Encoder_MainFunction:
        period_ms: 10
        priority: 10
        wdgm_se_id: 2
      Can_MainFunction_Read:
        period_ms: 1
        priority: 9
        wdgm_se_id: 0xFF
      Com_MainFunction_Rx:
        period_ms: 10
        priority: 8
        wdgm_se_id: 0xFF
      # Swc_RzcCom_Receive: REMOVED — RX auto-push handles all signal bridging
      Swc_RzcSensorFeeder_MainFunction:
        period_ms: 10
        priority: 6
        wdgm_se_id: 0xFF
      # Swc_RzcCom_TransmitSchedule: REMOVED — TX auto-pull handles all signal packing
      Com_MainFunction_Tx:
        period_ms: 10
        priority: 4
        wdgm_se_id: 0xFF
      Swc_TempMonitor_MainFunction:
        period_ms: 100
        priority: 4
        wdgm_se_id: 3
      Swc_Battery_MainFunction:
        period_ms: 100
        priority: 4
        wdgm_se_id: 4
      Swc_Heartbeat_MainFunction:
        period_ms: 50
        priority: 3
        wdgm_se_id: 5
      Can_MainFunction_BusOff:
        period_ms: 10
        priority: 2
        wdgm_se_id: 0xFF
      Swc_RzcSafety_MainFunction:
        period_ms: 100
        priority: 2
        wdgm_se_id: 6

  bcm:
    e2e_data_ids:
      BCM_E2E_HEARTBEAT_DATA_ID: 0x12    # CAN 0x016 → DBC DataID 18

    pdu_e2e_map:
      BCM_Heartbeat: 0x51

    enums:
      BCM_VSTATE_INIT: 0
      BCM_VSTATE_READY: 1
      BCM_VSTATE_DRIVING: 2
      BCM_VSTATE_DEGRADED: 3
      BCM_VSTATE_ESTOP: 4
      BCM_VSTATE_FAULT: 5

    thresholds:
      BCM_RTE_PERIOD_MS: 50  # QM — 50ms tick sufficient for body control
      BCM_COMM_TIMEOUT: 200
      BCM_INDICATOR_BLINK_MS: 500
      BCM_INDICATOR_FLASH_ON: 33
      BCM_INDICATOR_FLASH_OFF: 33
      BCM_AUTO_LOCK_SPEED: 10
      BCM_DOOR_LOCK_TIMEOUT: 3000

  icu:
    e2e_data_ids:
      ICU_E2E_HEARTBEAT_DATA_ID: 0x10    # CAN 0x014 → DBC DataID 16

    pdu_e2e_map:
      ICU_Heartbeat: 0x31

    rte_aliases:
      ICU_SIG_MOTOR_RPM:          Motor_Status_MotorSpeed_RPM
      ICU_SIG_TORQUE_PCT:         Torque_Request_Command_pct
      ICU_SIG_MOTOR_TEMP:         Motor_Temperature_WindingTemp1_C
      ICU_SIG_BATTERY_VOLTAGE:    Battery_Status_BatteryVoltage_mV
      ICU_SIG_VEHICLE_STATE:      Vehicle_State_Mode
      ICU_SIG_ESTOP_ACTIVE:       EStop_Broadcast_Active
      ICU_SIG_HEARTBEAT_CVC:      CVC_Heartbeat_E2E_AliveCounter
      ICU_SIG_HEARTBEAT_FZC:      FZC_Heartbeat_E2E_AliveCounter
      ICU_SIG_HEARTBEAT_RZC:      RZC_Heartbeat_E2E_AliveCounter
      ICU_SIG_OVERCURRENT_FLAG:   Motor_Current_OvercurrentFlag
      ICU_SIG_DTC_BROADCAST:      DTC_Broadcast_Number

    thresholds:
      ICU_RTE_PERIOD_MS: 50
      ICU_COMM_TIMEOUT: 200
      ICU_DISPLAY_REFRESH_MS: 100
      ICU_DTC_PAGE_SIZE: 8

  tcu:
    dtc_events:
      TCU_DTC_AGING_CLEAR_CYCLES: 0

    e2e_data_ids:
      TCU_E2E_HEARTBEAT_DATA_ID: 0x11    # CAN 0x015 → DBC DataID 17

    pdu_e2e_map:
      TCU_Heartbeat: 0x41

    rte_aliases:
      TCU_SIG_VEHICLE_SPEED:      Motor_Status_MotorSpeed_RPM
      TCU_SIG_MOTOR_TEMP:         Motor_Temperature_WindingTemp1_C
      TCU_SIG_BATTERY_VOLTAGE:    Battery_Status_BatteryVoltage_mV
      TCU_SIG_MOTOR_CURRENT:      Motor_Current_Phase_mA
      TCU_SIG_TORQUE_PCT:         Torque_Request_Command_pct
      TCU_SIG_MOTOR_RPM:          Motor_Status_MotorSpeed_RPM
      TCU_SIG_DTC_BROADCAST:      DTC_Broadcast_Number

    thresholds:
      TCU_RTE_PERIOD_MS: 50  # QM — 50ms tick sufficient for diagnostics
      TCU_COMM_TIMEOUT: 200
