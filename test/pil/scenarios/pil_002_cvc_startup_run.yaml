name: CVC Startup to RUN State
id: PIL-002
description: >
  Verify the CVC ECU completes self-test and transitions from INIT to RUN
  when all simulated ECU heartbeats are present. The Vehicle_State message
  (0x100) must report state=RUN with valid E2E protection.
verifies:
  - SWR-CVC-002
  - SWR-CVC-003
  - TSR-031
asil: D
aspice: SWE.5
timeout_sec: 30

setup:
  - action: wait
    seconds: 2
    description: "Allow heartbeat injector to stabilize"

steps:
  - action: wait_state
    state: RUN
    timeout: 15
    description: "Wait for CVC to reach RUN state"

verdicts:
  - type: vehicle_state
    expected: RUN
    within_ms: 15000
    description: "CVC reaches RUN state after self-test"

  - type: can_message
    can_id: 0x100
    timeout_sec: 5
    description: "Vehicle_State message (0x100) is being transmitted"

  - type: e2e
    can_id: 0x100
    description: "Vehicle_State has valid E2E CRC-8"

  - type: timing
    can_id: 0x100
    period_ms: 10
    tolerance_pct: 25
    description: "Vehicle_State transmitted at 10ms period"

teardown: []
