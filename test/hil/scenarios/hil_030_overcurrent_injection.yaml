name: "Overcurrent Fault Injection"
id: "HIL-030"
description: >
  Injects an overcurrent fault via MQTT and verifies that the system
  broadcasts a DTC and transitions to DEGRADED or SAFE_STOP state.
verifies:
  - "TSR-007"
  - "SSR-RZC-004"
asil: "B"
aspice: "SWE.6"
iso_reference: "ISO 26262 Part 4, Section 7"
timeout_sec: 30
requires_mqtt: true

setup:
  - action: wait_state
    state: RUN
    timeout: 20
    description: "Wait for system steady state"

steps:
  - action: inject_mqtt
    topic: "taktflow/command/plant_inject"
    payload:
      type: overcurrent
    description: "Inject overcurrent fault via MQTT"
  - action: wait
    seconds: 5
    description: "Wait for system to detect and react to overcurrent"

verdicts:
  - type: dtc_broadcast
    can_id: 0x500
    dtc_code: 0xE301
    ecu_source: 3
    description: "DTC 0xE301 broadcast from source 3 (RZC)"
  - type: vehicle_state
    expected:
      - DEGRADED
      - SAFE_STOP
    within_ms: 5000
    description: "Vehicle state transitions to DEGRADED or SAFE_STOP within 5s"

teardown:
  - action: reset
    description: "Reset"
