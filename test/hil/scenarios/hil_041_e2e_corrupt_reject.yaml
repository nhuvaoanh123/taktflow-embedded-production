name: "E2E Corrupt Frame Rejection"
id: "HIL-041"
description: >
  Injects a corrupt CAN frame on Vehicle_State (0x100) with an invalid
  CRC and verifies that the system remains operational by confirming
  the CVC heartbeat is still broadcasting after the corrupt frame.
verifies:
  - "TSR-023"
  - "SSR-CVC-010"
asil: "D"
aspice: "SWE.6"
iso_reference: "ISO 26262 Part 4, Section 7"
timeout_sec: 30
requires_mqtt: false

setup:
  - action: wait_state
    state: SAFE_STOP
    timeout: 20
    description: "Wait for system steady state"

steps:
  - action: inject_can
    can_id: 0x100
    data: [0xFF, 0x00, 0x01, 0x00, 0x00, 0x00]
    description: "Inject corrupt CAN frame on Vehicle_State with bad CRC"
  - action: wait
    seconds: 2
    description: "Wait and verify system does not crash"

verdicts:
  - type: can_message
    can_id: 0x010
    description: "CVC heartbeat still present after corrupt frame injection"

teardown:
  - action: reset
    description: "Reset"
