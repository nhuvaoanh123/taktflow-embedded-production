name: "Brake Pressure Tracking"
id: "HIL-005"
description: >
  Verifies that the FZC plant-sim produces a brake status response
  (CAN ID 0x201) and virtual sensor data (0x600) when a 50 % brake
  command is injected on 0x103.  Validates closed-loop brake tracking.
verifies:
  - "TSR-015"
  - "SSR-FZC-007"
asil: "D"
aspice: "SWE.6"
iso_reference: "ISO 26262 Part 4, Section 7"
timeout_sec: 30
requires_mqtt: false

setup:
  - action: wait_state
    state: SAFE_STOP
    timeout: 20
    description: "Wait for system to reach SAFE_STOP (no SC on bus)"

steps:
  - action: inject_can
    can_id: 0x103
    data: [0x00, 0x00, 0x32, 0x00, 0x00, 0x00, 0x00, 0x00]
    description: "Inject 50 % brake command"
  - action: wait
    seconds: 3
    description: "Allow brake model to respond"

verdicts:
  - type: can_message
    can_id: 0x201
    description: "Brake status frame present"
  - type: can_message
    can_id: 0x600
    description: "FZC virtual sensors frame present"

teardown:
  - action: inject_can
    can_id: 0x103
    data: [0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
    description: "Release brake command"
  - action: reset
    description: "Reset to idle"
