name: "ICU Body Status Broadcast"
id: "HIL-013"
description: >
  Verifies that the BCM body status frame (CAN ID 0x360) is present on
  the bus, confirming the ICU publishes body status data.
verifies:
  - "SWR-ICU-009"
asil: "QM"
aspice: "SWE.6"
iso_reference: "ISO 26262 Part 4, Section 7"
timeout_sec: 30
requires_mqtt: false

setup:
  - action: wait_state
    state: SAFE_STOP
    timeout: 20
    description: "Wait for system to reach SAFE_STOP (no SC on bus)"

steps:
  - action: wait
    seconds: 5
    description: "Allow BCM to publish body status"

verdicts:
  - type: can_message
    can_id: 0x360
    description: "BCM body status frame present"

teardown:
  - action: reset
    description: "Reset to idle"
