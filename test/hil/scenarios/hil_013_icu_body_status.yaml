name: "BCM Light Status Broadcast"
id: "HIL-013"
description: >
  Verifies that the BCM Light_Status frame (CAN ID 0x400) is present
  on the bus, confirming the BCM publishes body lighting data.
verifies:
  - "SWR-ICU-009"
asil: "QM"
aspice: "SWE.6"
iso_reference: "ISO 26262 Part 4, Section 7"
timeout_sec: 30
requires_mqtt: false

setup:
  - action: wait_state
    state: RUN
    timeout: 20
    description: "Wait for system steady state (RUN)"

steps:
  - action: wait
    seconds: 5
    description: "Allow BCM to publish body status"

verdicts:
  - type: can_message
    can_id: 0x400
    description: "BCM Light_Status frame present"

teardown:
  - action: reset
    description: "Reset to idle"
