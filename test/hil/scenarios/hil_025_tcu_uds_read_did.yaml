name: "TCU UDS ReadDataByIdentifier"
id: "HIL-025"
description: >
  Verifies that the TCU responds to a UDS ReadDataByIdentifier request
  for the vehicle state DID (0xF190) sent via functional addressing
  (0x7DF) with a response on 0x644.
verifies:
  - "SWR-TCU-005"
asil: "QM"
aspice: "SWE.6"
iso_reference: "ISO 26262 Part 4, Section 7"
timeout_sec: 30
requires_mqtt: false

setup:
  - action: wait_state
    state: SAFE_STOP
    timeout: 20
    description: "Wait for system steady state"

steps:
  - action: inject_can
    can_id: 0x7DF
    data: [0x03, 0x22, 0xF1, 0x90, 0x00, 0x00, 0x00, 0x00]
    description: "Inject UDS ReadDataByIdentifier for vehicle state DID on functional address"
  - action: wait
    seconds: 2
    description: "Wait for TCU UDS response"

verdicts:
  - type: can_message
    can_id: 0x644
    description: "TCU UDS response present for ReadDataByIdentifier"

teardown:
  - action: reset
    description: "Reset"
