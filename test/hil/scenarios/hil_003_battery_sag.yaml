name: "Battery Voltage Sag Under Load"
id: "HIL-003"
description: >
  Verifies that the battery status frame (CAN ID 0x303) is present and
  contains a readable voltage value after sustained torque is applied
  for 5 seconds.  Validates the battery model feedback in the RZC loop.
verifies:
  - "TSR-046"
  - "SSR-RZC-001"
asil: "B"
aspice: "SWE.6"
iso_reference: "ISO 26262 Part 4, Section 7"
timeout_sec: 40
requires_mqtt: false

setup:
  - action: wait_state
    state: RUN
    timeout: 20
    description: "Wait for system steady state (RUN)"

steps:
  - action: inject_can
    can_id: 0x101
    data: [0x00, 0x00, 0x50, 0x00, 0x00, 0x00, 0x00, 0x00]
    description: "Inject sustained torque request"
  - action: wait
    seconds: 5
    description: "Allow battery model to reflect load"

verdicts:
  - type: can_message
    can_id: 0x303
    description: "Battery status frame present (voltage readable)"

teardown:
  - action: inject_can
    can_id: 0x101
    data: [0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
    description: "Remove torque request"
  - action: reset
    description: "Reset to idle"
