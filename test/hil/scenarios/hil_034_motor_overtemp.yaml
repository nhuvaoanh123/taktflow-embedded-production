name: "Motor Overtemperature Fault Injection"
id: "HIL-034"
description: >
  Injects a motor overtemperature fault via MQTT and verifies that
  the system broadcasts a DTC indicating the thermal limit has been
  exceeded.
verifies:
  - "TSR-009"
  - "SSR-RZC-006"
asil: "B"
aspice: "SWE.6"
iso_reference: "ISO 26262 Part 4, Section 7"
timeout_sec: 30
requires_mqtt: true

setup:
  - action: wait_state
    state: SAFE_STOP
    timeout: 20
    description: "Wait for system steady state"

steps:
  - action: inject_mqtt
    topic: "taktflow/command/plant_inject"
    payload: '{"fault":"overtemp","temp_c":120}'
    description: "Inject motor overtemperature fault via MQTT"
  - action: wait
    seconds: 5
    description: "Wait for system to detect and react to overtemperature"

verdicts:
  - type: dtc_broadcast
    can_id: 0x500
    description: "DTC broadcast for motor overtemperature condition"

teardown:
  - action: reset
    description: "Reset"
