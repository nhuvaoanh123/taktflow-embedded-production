name: "CVC Heartbeat Liveness"
id: "HIL-010"
description: >
  Verifies that the CVC publishes its heartbeat on CAN ID 0x010 at the
  specified 50 ms period with no more than 15 % jitter.
verifies:
  - "TSR-025"
  - "SSR-CVC-011"
asil: "C"
aspice: "SWE.6"
iso_reference: "ISO 26262 Part 4, Section 7"
timeout_sec: 30
requires_mqtt: false

setup:
  - action: wait_state
    state: SAFE_STOP
    timeout: 20
    description: "Wait for system to reach SAFE_STOP (no SC on bus)"

steps:
  - action: wait
    seconds: 5
    description: "Collect heartbeat samples"

verdicts:
  - type: heartbeat
    can_id: 0x010
    period_ms: 50
    tolerance_pct: 15
    description: "CVC heartbeat at 50 ms ±15 %"

teardown:
  - action: reset
    description: "Reset to idle"
