name: "TCU UDS Diagnostic Session Control"
id: "HIL-024"
description: >
  Verifies that the TCU responds to a UDS DiagSessionControl request
  sent via functional addressing (0x7DF) with a response on 0x644
  within the required time window.
verifies:
  - "SWR-TCU-002"
  - "SWR-TCU-004"
asil: "QM"
aspice: "SWE.6"
iso_reference: "ISO 26262 Part 4, Section 7"
timeout_sec: 30
requires_mqtt: false

setup:
  - action: wait_state
    state: RUN
    timeout: 20
    description: "Wait for system steady state"

steps:
  - action: inject_can
    can_id: 0x7DF
    data: [0x02, 0x10, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00]
    description: "Inject UDS DiagSessionControl (default session) request on functional address"
  - action: wait
    seconds: 2
    description: "Wait for TCU UDS response"

verdicts:
  - type: can_message
    can_id: 0x644
    timeout_sec: 2
    description: "TCU UDS response present within 2s"

teardown:
  - action: reset
    description: "Reset"
