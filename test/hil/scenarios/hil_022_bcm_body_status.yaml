name: "BCM Light Status Timing"
id: "HIL-022"
description: >
  Verifies that the BCM broadcasts Light_Status (0x400) at the
  specified 100ms period within acceptable tolerance.
verifies:
  - "SWR-BCM-010"
asil: "QM"
aspice: "SWE.6"
iso_reference: "ISO 26262 Part 4, Section 7"
timeout_sec: 30
requires_mqtt: false

setup:
  - action: wait_state
    state: RUN
    timeout: 20
    description: "Wait for system steady state"

steps:
  - action: wait
    seconds: 3
    description: "Observe Body_Status timing on the bus"

verdicts:
  - type: timing
    can_id: 0x400
    period_ms: 100
    tolerance_pct: 20
    description: "Light_Status broadcast period is 100ms within 20% tolerance"

teardown:
  - action: reset
    description: "Reset"
