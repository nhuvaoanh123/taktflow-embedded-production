name: "BCM Turn Signal Indicator Response"
id: "HIL-021"
description: >
  Verifies that the BCM responds to a Body_Command (0x350) containing
  a turn signal byte by broadcasting Indicator_State (0x401).
verifies:
  - "SWR-BCM-006"
  - "SWR-BCM-007"
asil: "QM"
aspice: "SWE.6"
iso_reference: "ISO 26262 Part 4, Section 7"
timeout_sec: 30
requires_mqtt: false

setup:
  - action: wait_state
    state: RUN
    timeout: 20
    description: "Wait for system steady state"

steps:
  - action: inject_can
    can_id: 0x350
    data: [0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
    description: "Inject Body_Command with turn signal byte set"
  - action: wait
    seconds: 2
    description: "Wait for BCM to process and respond"

verdicts:
  - type: can_message
    can_id: 0x401
    description: "Indicator_State frame present on CAN bus"

teardown:
  - action: reset
    description: "Reset"
