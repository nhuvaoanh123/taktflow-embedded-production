name: "Alive Counter Increment on Vehicle State"
id: "HIL-042"
description: >
  Observes Vehicle_State (0x100) over a 2-second window and verifies
  that the E2E alive counter is incrementing and the CRC remains valid,
  confirming continuous E2E protection integrity.
verifies:
  - "TSR-024"
  - "SSR-FZC-015"
asil: "D"
aspice: "SWE.6"
iso_reference: "ISO 26262 Part 4, Section 7"
timeout_sec: 30
requires_mqtt: false

setup:
  - action: wait_state
    state: RUN
    timeout: 20
    description: "Wait for system steady state"

steps:
  - action: wait
    seconds: 2
    description: "Observe Vehicle_State for alive counter increments"

verdicts:
  - type: e2e
    can_id: 0x100
    description: "Alive counter is incrementing and CRC-8 is valid on Vehicle_State"

teardown:
  - action: reset
    description: "Reset"
