name: "BCM Headlight Status Broadcast"
id: "HIL-020"
description: >
  Verifies that the BCM simulated ECU broadcasts Light_Status (0x400)
  on the CAN bus, confirming headlight state reporting is active.
verifies:
  - "SWR-BCM-003"
  - "SWR-BCM-004"
asil: "QM"
aspice: "SWE.6"
iso_reference: "ISO 26262 Part 4, Section 7"
timeout_sec: 30
requires_mqtt: false

setup:
  - action: wait_state
    state: RUN
    timeout: 20
    description: "Wait for system steady state"

steps:
  - action: wait
    seconds: 3
    description: "Observe BCM traffic on the bus"

verdicts:
  - type: can_message
    can_id: 0x400
    description: "Light_Status frame present on CAN bus"

teardown:
  - action: reset
    description: "Reset"
