name: "Battery Undervoltage Fault Injection"
id: "HIL-033"
description: >
  Injects a low battery voltage and SOC fault via MQTT and verifies
  that the system transitions to DEGRADED, LIMP, or SAFE_STOP within
  the allowed time window.
verifies:
  - "TSR-046"
  - "SSR-RZC-001"
asil: "B"
aspice: "SWE.6"
iso_reference: "ISO 26262 Part 4, Section 7"
timeout_sec: 30
requires_mqtt: true

setup:
  - action: wait_state
    state: RUN
    timeout: 20
    description: "Wait for system steady state"

steps:
  - action: inject_mqtt
    topic: "taktflow/command/plant_inject"
    payload:
      type: voltage
      mV: 9000
      soc: 5
    description: "Inject low battery voltage and SOC via MQTT"
  - action: wait
    seconds: 8
    description: "Wait for system to detect and react to undervoltage"

verdicts:
  - type: vehicle_state
    expected:
      - DEGRADED
      - LIMP
      - SAFE_STOP
    within_ms: 8000
    description: "Vehicle state transitions to DEGRADED, LIMP, or SAFE_STOP within 8s"

teardown:
  - action: reset
    description: "Reset"
