# =============================================================================
# @file    sil_003_emergency_stop.yaml
# @brief   SIL-003: Emergency Stop — ASIL D full safety chain validation
# @aspice  SWE.5 — Software Component Verification & Integration
# @iso     ISO 26262 Part 6, Section 10 — Software Integration & Testing
# @verifies  SG-008, TSR-046, SSR-CVC-029
# @date    2026-03-19
#
# TRACEABILITY:
#   HARA:  HE-013 (E-stop not functional, ASIL B)
#   SG:    SG-008 (Independent safety monitoring + E-stop, ASIL C, FTTI 100ms)
#          SG-001 (Prevent unintended acceleration, ASIL D, FTTI 50ms)
#   SYS:   SYS-028 (E-stop detection and broadcast, ASIL B)
#          SYS-029 (Vehicle state machine, ASIL D)
#          SYS-032 (E2E protection on safety-critical messages, ASIL D)
#          SYS-033 (CAN message priority: 0x001 = highest, ASIL D)
#   SWR:   SWR-CVC-018 (E-stop GPIO detection, 1ms ISR latency)
#          SWR-CVC-019 (E-stop CAN broadcast, 10ms cyclic while latched)
#          SWR-CVC-009 (Vehicle state machine, E-stop → SAFE_STOP)
#          SWR-CVC-010 (SAFE_STOP: torque=0%, brakes=100%, steering=center)
#          SWR-CVC-011 (SAFE_STOP entry sequence)
#          SWR-CVC-022 (Peer ECU heartbeat monitoring continues in SAFE_STOP)
#   TSC:   FSR-016 (Kill relay de-energization, ASIL D, <5ms)
#
# SAFE STATE:
#   SS-MOTOR-OFF: Motor torque=0, H-bridge disabled, brakes applied
#
# TEST STRATEGY:
#   Phase 1: Establish steady-state drive (50% torque, motor RPM > 0)
#   Phase 2: Inject E-Stop via GPIO DIO pin (simulates physical button press)
#   Phase 3: Verify CVC local reaction (state transition + RTE)
#   Phase 4: Verify CAN broadcast (0x001 with Active=1, cyclic 10ms)
#   Phase 5: Verify multi-ECU propagation (motor off, brakes, steering)
#   Phase 6: Verify latch persistence (no recovery without power cycle)
#
# FTTI BUDGET (SYS-028):
#   GPIO detection:    <1ms  (SWR-CVC-018)
#   Software debounce: 10ms  (1 cycle × 10ms period)
#   CAN TX:            <1ms  (SWR-CVC-019)
#   CAN propagation:   <1ms  (500kbps bus)
#   RZC motor disable: <10ms (RZC 10ms task cycle)
#   Total:             ~23ms << 100ms FTTI (SG-008)
# =============================================================================

name: "Emergency Stop"
id: "SIL-003"
description: >
  ASIL D end-to-end E-Stop safety chain validation.
  From steady-state drive: inject E-Stop GPIO → verify CVC detection →
  CAN 0x001 broadcast → all actuators safe → state SAFE_STOP → latch.
  Tests the most critical safety path in the system.
verifies:
  - "SWR-CVC-018"   # E-Stop GPIO detection
  - "SWR-CVC-019"   # E-Stop CAN broadcast (cyclic while latched)
  - "SWR-CVC-009"   # Vehicle state machine (E-Stop → SAFE_STOP)
  - "SWR-CVC-010"   # SAFE_STOP actuator limits (torque=0, brake=100%)
  - "SWR-CVC-011"   # SAFE_STOP entry sequence
  - "SWR-CVC-022"   # Heartbeat continues in SAFE_STOP
  - "SWR-BSW-019"   # Safe state transition on critical fault
  - "SYS-028"       # E-Stop detection and broadcast
  - "SYS-029"       # Vehicle state machine
  - "SG-008"        # Independent safety monitoring + E-stop
aspice: "SWE.5"
iso_reference: "ISO 26262 Part 6, Section 10"
timeout_sec: 120

# =========================================================================
# PHASE 1: Establish pre-conditions (steady-state drive)
# =========================================================================
setup:
  - action: reset
    description: "Power-cycle all ECUs for clean state (no latched faults)"
  - action: wait_state
    state: RUN
    timeout: 30
    description: >
      Wait for: INIT hold (10s) + heartbeat exchange (FZC+RZC alive) +
      post-INIT grace (10s) + Docker scheduling margin

  - action: inject_scenario
    name: normal_drive
    description: >
      Pre-condition: 50% torque forward, steer 0°, brake 0%.
      Motor must be running (RPM > 0) before E-Stop injection.
      This proves the drive chain is active — E-Stop must halt it.

  - action: wait
    seconds: 5
    description: >
      Allow motor to reach steady-state RPM (plant-sim physics model
      needs ~2s to accelerate from standstill at 50% torque)

# =========================================================================
# PHASE 2: Inject E-Stop (simulates physical GPIO button press)
# =========================================================================
steps:
  - action: inject_scenario
    name: estop
    description: >
      UDP DIO injection: sets CVC GPIO channel 5 (EStopDioChannel) = HIGH.
      Simulates physical E-Stop button press. CVC detects via
      IoHwAb_ReadEStop → Dio_ReadChannel(5) in Swc_EStop_MainFunction.

  - action: wait
    seconds: 5
    description: >
      Allow E-Stop to propagate through full chain:
      CVC detect (10ms) → CAN 0x001 TX (10ms) → RZC/FZC RX (10ms) →
      motor deceleration (physics: ~2s from 50% torque to RPM=0).
      5s provides margin for Docker scheduling jitter.

# =========================================================================
# PHASE 3+4+5: Verify safety chain (ordered by criticality)
# =========================================================================
verdicts:
  # --- VERDICT 1: CVC state transition (SWR-CVC-009, SYS-029, ASIL D) ---
  - type: vehicle_state
    expected: SAFE_STOP
    within_ms: 2000
    description: >
      [SWR-CVC-009] CVC vehicle state must reach SAFE_STOP (state=4).
      Transition table: RUN + EVT_ESTOP → SAFE_STOP.
      FTTI budget: 23ms (GPIO + debounce + CAN). 2s margin for Docker.
      Verified via CAN 0x100 byte 2 = 0x04.

  # --- VERDICT 2: E-Stop broadcast on CAN (SWR-CVC-019, SYS-028) ---
  - type: can_message
    can_id: 0x001
    field: estop_active
    expected: 1
    within_ms: 5000
    description: >
      [SWR-CVC-019] CVC must broadcast EStop_Broadcast (0x001) with
      Active=1 cyclically every 10ms while latched (IfActive pattern).
      This is how FZC/RZC/SC learn about the E-Stop.
      Without this frame, only CVC knows — safety chain is broken.
      CAN ID 0x001 = highest arbitration priority (SYS-033).

  # --- VERDICT 3: Motor shutdown (SWR-CVC-010, SG-001, ASIL D) ---
  - type: motor_shutdown
    within_ms: 5000
    description: >
      [SWR-CVC-010] Motor RPM must reach 0 within 5s.
      SAFE_STOP mode limit = 0% torque (Pedal_GetModeLimit returns 0).
      RZC receives zero torque via CAN 0x101 and disables H-bridge.
      Plant-sim physics: deceleration from 50% torque to standstill ~2s.

  # --- VERDICT 4: Torque command zeroed (SWR-CVC-011) ---
  - type: can_message
    can_id: 0x101
    field: torque_request
    expected: 0
    description: >
      [SWR-CVC-011] Torque_Request (0x101) must show 0% torque.
      Swc_Pedal reads vehicle state = SAFE_STOP → mode_limit = 0 →
      torque output clamped to 0. Com_SendSignal updates CAN frame.

  # --- VERDICT 5: Steering centered (SWR-CVC-011) ---
  - type: can_message
    can_id: 0x102
    field: steer_angle
    expected: 0
    description: >
      [SWR-CVC-011] Steer_Command (0x102) must show 0° (center).
      CVC commands neutral steering in SAFE_STOP entry sequence.
      FZC Swc_Steering centers the servo on receiving 0° command.

  # --- VERDICT 6: CVC heartbeat continues (SWR-CVC-022, SWR-CVC-020) ---
  - type: can_message
    can_id: 0x010
    description: >
      [SWR-CVC-020] CVC heartbeat (0x010) must continue broadcasting
      at 50ms interval even in SAFE_STOP. Heartbeat carries operating
      mode = SAFE_STOP (state 4) so other ECUs know CVC is alive but
      in safe state. SC monitors this — if heartbeat stops, SC kills relay.

  # --- VERDICT 7: FZC heartbeat continues ---
  - type: can_message
    can_id: 0x011
    description: >
      FZC heartbeat (0x011) must continue in SAFE_STOP.
      FZC is still alive — it disabled steering servo but continues
      heartbeat for SC monitoring.

  # --- VERDICT 8: RZC heartbeat continues ---
  - type: can_message
    can_id: 0x012
    description: >
      RZC heartbeat (0x012) must continue in SAFE_STOP.
      RZC disabled motor but continues heartbeat for SC monitoring.

# =========================================================================
# PHASE 6: Teardown (power cycle to clear E-Stop latch)
# =========================================================================
teardown:
  - action: reset
    description: >
      Power-cycle all ECUs to clear E-Stop latch (SWR-CVC-019:
      E-Stop latch is permanent until power cycle).
      No software clear exists — this is by design (SWR-CVC-013).
