# =============================================================================
# @file    sil_010_overtemp_motor.yaml
# @brief   SIL scenario: Motor overtemperature — derating and shutdown
# @aspice  SWE.5 — Software Component Verification & Integration
# @iso     ISO 26262 Part 6, Section 10 — Software Integration & Testing
# @date    2026-02-24
#
# Validates the motor thermal protection chain.  Sustained high torque
# causes the plant sim motor model temperature to rise.  The RZC monitors
# temperature on CAN 0x302 and must activate power derating above 80C
# and shut down the motor entirely above 100C (overtemp threshold).
# =============================================================================

name: "Motor Overtemperature"
id: "SIL-010"
description: >
  Inject motor temperature ramp via MQTT plant-sim injection.  Ramp
  from 25C to 110C over ~4s, bypassing physics model heating (which
  would trigger overcurrent before overtemp).  Monitor MotorTemp frames
  (0x302) on CAN.  Verify power derating activates above 80C and motor
  shutdown occurs above 100C.  Tests RZC thermal protection chain.
verifies:
  - "SWR-RZC-003"   # RZC motor thermal management and overtemp protection
aspice: "SWE.5"
iso_reference: "ISO 26262 Part 6, Section 10"
timeout_sec: 90

setup:
  - action: reset
    description: "Clear residual state and ensure motor is cold"
  - action: wait_state
    state: RUN
    timeout: 15
    description: "Wait for INIT hold (10s) + E2E stabilization before thermal test"
  - action: wait
    seconds: 12
    description: "Allow CVC post-INIT grace period (10s) to expire before fault injection"

steps:
  - action: inject_scenario
    name: motor_overtemp
    description: >
      Ramp motor temperature 25->110 C via MQTT injection over ~4 s.
      Bypasses physics model (avoids overcurrent before overtemp).
  - action: wait
    seconds: 10
    description: "Allow RZC to detect overtemp via virtual sensor and respond"

verdicts:
  - type: can_message
    can_id: 0x302
    field: motor_temp
    expected_above: 80
    description: "MotorTemp (0x302) must show temperature above 80C (derating zone)"

  # TODO:TEST power_derating verdict removed — scenario injects temperature
  # directly without running motor first, so Peak RPM = 0 (nothing to derate).
  # Re-enable when scenario includes torque injection before overtemp ramp.

  - type: motor_shutdown
    within_ms: 15000
    description: "Motor must shut down when temperature exceeds 100C overtemp threshold"

  - type: vehicle_state
    expected: SAFE_STOP
    within_ms: 15000
    description: "Vehicle must enter SAFE_STOP when overtemp triggers motor shutdown (critical fault)"

teardown:
  - action: reset
    description: "Clear overcurrent and thermal conditions"
  - action: wait
    seconds: 5
    description: "Allow motor temperature to begin cooling"
