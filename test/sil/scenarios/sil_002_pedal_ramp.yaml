# =============================================================================
# @file    sil_002_pedal_ramp.yaml
# @brief   SIL scenario: Pedal ramp 0% -> 100% -> 0% with motor tracking
# @aspice  SWE.5 — Software Component Verification & Integration
# @iso     ISO 26262 Part 6, Section 10 — Software Integration & Testing
# @date    2026-02-24
#
# Validates the primary drive chain: torque request from CVC is processed
# by RZC, motor responds proportionally, and CAN feedback (RPM, current)
# follows the commanded torque within the specified tracking window.
# =============================================================================

name: "Pedal Drive Chain"
id: "SIL-002"
description: >
  Inject a normal_drive scenario (50% pedal) and verify the complete drive
  chain end-to-end: CVC generates torque request from pedal SPI override,
  RZC receives via CAN 0x100, motor model produces RPM, and Motor_Status
  (0x300) shows non-zero RPM.  Extended observation window absorbs CI
  Docker scheduling jitter that can cause brief state transients.
verifies:
  - "SWR-CVC-001"   # CVC torque command generation from pedal input
  - "SWR-RZC-001"   # RZC motor control loop — torque tracking
aspice: "SWE.5"
iso_reference: "ISO 26262 Part 6, Section 10"
timeout_sec: 120

setup:
  - action: reset
    description: "Clear residual state and ensure clean start"
  - action: wait_state
    state: RUN
    timeout: 15
    description: "Wait for INIT hold (10s) + E2E stabilization before applying torque"
  - action: wait
    seconds: 15
    description: "Allow CVC post-INIT grace period (10s) + margin for CI jitter"

steps:
  - action: inject_scenario
    name: normal_drive
    description: "Apply 50% torque forward, steer 0 deg, brake 0%"
  - action: wait
    seconds: 50
    description: "Extended drive window — 50 / scale=10 = 5s wall, absorbs transient recovery"

verdicts:
  - type: vehicle_state
    expected: RUN
    within_ms: 15000
    description: "Vehicle must be in RUN state for drive chain validation"

  - type: can_message
    can_id: 0x100
    description: "Vehicle_State frame (0x100) present on CAN bus"

  - type: motor_tracking
    within_ms: 30000
    description: "Motor RPM > 0 observed during drive phase (30s virtual observation window)"

  - type: can_message
    can_id: 0x300
    description: "Motor_Status frame (0x300) present on CAN bus"

teardown:
  - action: reset
    description: "Clear pedal override and return motor to idle"
  - action: wait
    seconds: 5
    description: "Allow motor to stop"
