name: HIL Preflight Nightly

on:
  schedule:
    - cron: "15 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preflight-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.11"

      - name: Run HIL preflight audit
        run: |
          python tools/ci/hil_preflight_audit.py --output-dir build

      - name: Print summary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          p = Path("build/hil-preflight-audit.json")
          data = json.loads(p.read_text(encoding="utf-8"))
          s = data["summary"]
          print("=== HIL Preflight Summary ===")
          print(f"Total: {s['total']}")
          print(f"Critical: {s['critical']}")
          print(f"High: {s['high']}")
          print(f"Medium: {s['medium']}")
          print(f"Low: {s['low']}")
          PY

      - name: Upload preflight artifacts
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: hil-preflight-audit
          path: |
            build/hil-preflight-audit.json
            build/hil-preflight-audit.md
