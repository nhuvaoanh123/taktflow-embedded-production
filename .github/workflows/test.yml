# =============================================================================
# Unit Tests + Coverage — GitHub Actions
#
# Runs BSW unit tests with gcov/lcov coverage collection.
# ISO 26262-6 Table 9 targets: Branch 100%, MC/DC 100%
# =============================================================================
name: Tests & Coverage

on:
  push:
    paths: ['firmware/**', 'test/**', '.github/workflows/test.yml']
  pull_request:
    paths: ['firmware/**', 'test/**', '.github/workflows/test.yml']

jobs:
  bsw-unit-tests:
    name: BSW Unit Tests + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Build Com tests with coverage
        run: |
          gcc -DPLATFORM_POSIX -DUNIT_TEST --coverage -g -O0 -Wall \
            -Ifirmware/bsw/include \
            -Ifirmware/bsw/services/Com/include \
            -Ifirmware/bsw/services/E2E/include \
            -Ifirmware/bsw/services/Dem/include \
            -Ifirmware/bsw/services/Det/include \
            -Ifirmware/bsw/services/SchM/include \
            -Ifirmware/bsw/services/WdgM/include \
            -Ifirmware/bsw/services/BswM/include \
            -Ifirmware/bsw/services/NvM/include \
            -Ifirmware/bsw/rte/include \
            -Ifirmware/bsw/ecual/PduR/include \
            -Ifirmware/bsw/ecual/CanIf/include \
            -Ifirmware/bsw/ecual/IoHwAb/include \
            -Ifirmware/bsw/mcal/Can/include \
            -Ifirmware/bsw/mcal/Adc/include \
            -Ifirmware/bsw/mcal/Pwm/include \
            -Ifirmware/bsw/mcal/Dio/include \
            -Ifirmware/bsw/mcal/Gpt/include \
            -Ifirmware/bsw/mcal/Spi/include \
            -Ifirmware/bsw/mcal/Uart/include \
            -Ifirmware/bsw/os/include \
            -Ifirmware/platform/posix/include \
            -Ifirmware/lib/vendor/unity \
            -o test_com \
            test/unit/bsw/test_Com_asild.c \
            test/unit/bsw/stubs_com_test.c \
            firmware/bsw/services/Com/src/Com.c \
            firmware/bsw/services/E2E/src/E2E.c \
            firmware/lib/vendor/unity/unity.c \
            --coverage

      - name: Run Com tests
        run: ./test_com

      - name: Build + run CanSM tests
        run: |
          gcc -DPLATFORM_POSIX -DUNIT_TEST --coverage -g -O0 -Wall \
            -Ifirmware/bsw/include \
            -Ifirmware/bsw/services/CanSM/include \
            -Ifirmware/bsw/services/Det/include \
            -Ifirmware/lib/vendor/unity \
            -o test_cansm \
            test/unit/bsw/test_CanSM_asild.c \
            firmware/bsw/services/CanSM/src/CanSM.c \
            firmware/lib/vendor/unity/unity.c \
            --coverage
          ./test_cansm

      - name: Build + run E2E SM tests
        run: |
          gcc -DPLATFORM_POSIX -DUNIT_TEST --coverage -g -O0 -Wall \
            -Ifirmware/bsw/include \
            -Ifirmware/bsw/services/E2E/include \
            -Ifirmware/bsw/services/Det/include \
            -Ifirmware/bsw/services/Dem/include \
            -Ifirmware/bsw/services/SchM/include \
            -Ifirmware/lib/vendor/unity \
            -o test_e2e_sm \
            test/unit/bsw/test_E2E_Sm_asild.c \
            test/unit/bsw/stubs_com_test.c \
            firmware/bsw/services/E2E/src/E2E.c \
            firmware/lib/vendor/unity/unity.c \
            --coverage
          ./test_e2e_sm

      - name: Generate coverage report
        if: always()
        run: |
          mkdir -p coverage
          lcov --capture --directory . --output-file coverage/raw.info --rc lcov_branch_coverage=1 --ignore-errors unused,unused
          lcov --remove coverage/raw.info '*/test/*' '*/unity/*' '*/stubs*' \
            --output-file coverage/filtered.info --rc lcov_branch_coverage=1 --ignore-errors unused,unused
          genhtml coverage/filtered.info --output-directory coverage/html \
            --branch-coverage --title "Taktflow BSW Coverage"
          echo "=== Coverage Summary ===" >> "$GITHUB_STEP_SUMMARY"
          lcov --summary coverage/filtered.info --rc lcov_branch_coverage=1 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bsw-coverage
          path: coverage/
          retention-days: 30
