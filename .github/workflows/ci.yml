# =============================================================================
# CI Pipeline — 7-step validation + unit tests + traceability
#
# Runs on every push/PR. BLOCKING: all gates must pass.
# Matches local workflow: DBC → ARXML → codegen → validate → test
# =============================================================================
name: CI

on:
  push:
    branches: [main, develop, 'feat/**', 'fix/**']
  pull_request:
    branches: [main, develop]

env:
  DBC: gateway/taktflow_vehicle.dbc

jobs:
  # -------------------------------------------------------------------
  # Gate 1: DBC Validation (12-point ISO 26262 audit)
  # -------------------------------------------------------------------
  step1-dbc:
    name: "Step 1: Validate DBC"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: '3.12'
      - run: pip install cantools pyyaml
      - run: python tools/pipeline/step1_validate_dbc.py $DBC

  # -------------------------------------------------------------------
  # Gate 2-3: ARXML Generation
  # -------------------------------------------------------------------
  step3-arxml:
    name: "Step 3: Generate ARXML"
    runs-on: ubuntu-latest
    needs: step1-dbc
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: '3.12'
      - run: pip install cantools pyyaml autosar-data jinja2
      - name: Generate ARXML from DBC
        run: |
          python tools/arxml/dbc2arxml.py $DBC arxml_v2/ arxml_v2/swc_model.json
          cp arxml_v2/TaktflowSystem.arxml arxml/TaktflowSystem.arxml
      - uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: arxml
          path: arxml/TaktflowSystem.arxml

  # -------------------------------------------------------------------
  # Gate 4: ARXML Validation
  # -------------------------------------------------------------------
  step4-validate-arxml:
    name: "Step 4: Validate ARXML"
    runs-on: ubuntu-latest
    needs: step3-arxml
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: '3.12'
      - run: pip install cantools pyyaml autosar-data
      - uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          name: arxml
          path: arxml/
      - run: python tools/pipeline/step4_validate_arxml.py arxml/TaktflowSystem.arxml $DBC

  # -------------------------------------------------------------------
  # Gate 5: C Config Generation
  # -------------------------------------------------------------------
  step5-codegen:
    name: "Step 5: Generate C Configs"
    runs-on: ubuntu-latest
    needs: step4-validate-arxml
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: '3.12'
      - run: pip install cantools pyyaml autosar-data jinja2
      - uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          name: arxml
          path: arxml/
      - name: Run codegen
        run: python -m tools.arxmlgen --config project.yaml
      - uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: generated-configs
          path: firmware/ecu/*/cfg/

  # -------------------------------------------------------------------
  # Gate 6: Round-trip Validation (E2E DataIDs + CycleTimeMs match DBC)
  # -------------------------------------------------------------------
  step6-roundtrip:
    name: "Step 6: Round-trip Check"
    runs-on: ubuntu-latest
    needs: step5-codegen
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: '3.12'
      - run: pip install cantools pyyaml autosar-data jinja2
      - uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          name: arxml
          path: arxml/
      - run: python -m tools.arxmlgen --config project.yaml
      - run: python tools/pipeline/step6_validate_configs.py $DBC

  # -------------------------------------------------------------------
  # Gate 7: Data Flow Enforcement (no SWC bypasses)
  # -------------------------------------------------------------------
  step7-dataflow:
    name: "Step 7: Data Flow Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: '3.12'
      - run: python tools/pipeline/step7_validate_dataflow.py

  # -------------------------------------------------------------------
  # Syntax Check: All generated configs compile
  # -------------------------------------------------------------------
  syntax-check:
    name: "Syntax Check (${{ matrix.ecu }})"
    runs-on: ubuntu-latest
    needs: step5-codegen
    strategy:
      fail-fast: false
      matrix:
        ecu: [cvc, fzc, rzc, sc, bcm, icu, tcu]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: '3.12'
      - run: pip install cantools pyyaml autosar-data jinja2
      - uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          name: arxml
          path: arxml/
      - run: python -m tools.arxmlgen --config project.yaml
      - name: Syntax check ${{ matrix.ecu }}
        run: |
          PLAT_INC=""
          if [ -d "firmware/ecu/${{ matrix.ecu }}/cfg/platform_posix" ]; then
            PLAT_INC="-Ifirmware/ecu/${{ matrix.ecu }}/cfg/platform_posix"
          fi
          for src in firmware/ecu/${{ matrix.ecu }}/cfg/*.c; do
            gcc -fsyntax-only -DPLATFORM_POSIX -DCANTP_ENABLED \
              -Ifirmware/bsw/include -Ifirmware/bsw/services/Com/include \
              -Ifirmware/bsw/services/Det/include -Ifirmware/bsw/services/Dem/include \
              -Ifirmware/bsw/services/E2E/include -Ifirmware/bsw/services/WdgM/include \
              -Ifirmware/bsw/services/BswM/include -Ifirmware/bsw/services/Dcm/include \
              -Ifirmware/bsw/services/SchM/include -Ifirmware/bsw/services/NvM/include \
              -Ifirmware/bsw/services/CanTp/include -Ifirmware/bsw/services/Sil/include \
              -Ifirmware/bsw/services/Xcp/include -Ifirmware/bsw/services/FiM/include \
              -Ifirmware/bsw/services/CanSM/include \
              -Ifirmware/bsw/mcal/Can/include -Ifirmware/bsw/mcal/Adc/include \
              -Ifirmware/bsw/mcal/Pwm/include -Ifirmware/bsw/mcal/Dio/include \
              -Ifirmware/bsw/mcal/Gpt/include -Ifirmware/bsw/mcal/Spi/include \
              -Ifirmware/bsw/mcal/Uart/include -Ifirmware/bsw/ecual/CanIf/include \
              -Ifirmware/bsw/ecual/PduR/include -Ifirmware/bsw/ecual/IoHwAb/include \
              -Ifirmware/bsw/os/include -Ifirmware/bsw/os/bootstrap/include \
              -Ifirmware/bsw/rte/include -Ifirmware/platform/posix/include \
              -Ifirmware/ecu/${{ matrix.ecu }}/include \
              -Ifirmware/ecu/${{ matrix.ecu }}/cfg $PLAT_INC \
              "$src" || exit 1
          done
          echo "PASS: ${{ matrix.ecu }}"

  # -------------------------------------------------------------------
  # Unit Tests: 750+ tests (existing + generated)
  # -------------------------------------------------------------------
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build and run Com tests
        run: |
          gcc -DPLATFORM_POSIX -DUNIT_TEST -g -O0 -Wall \
            -Ifirmware/bsw/include \
            -Ifirmware/bsw/services/Com/include \
            -Ifirmware/bsw/services/E2E/include \
            -Ifirmware/bsw/services/Dem/include \
            -Ifirmware/bsw/services/Det/include \
            -Ifirmware/bsw/services/SchM/include \
            -Ifirmware/bsw/services/WdgM/include \
            -Ifirmware/bsw/services/BswM/include \
            -Ifirmware/bsw/services/NvM/include \
            -Ifirmware/bsw/rte/include \
            -Ifirmware/bsw/ecual/PduR/include \
            -Ifirmware/bsw/ecual/CanIf/include \
            -Ifirmware/bsw/ecual/IoHwAb/include \
            -Ifirmware/bsw/mcal/Can/include \
            -Ifirmware/bsw/mcal/Adc/include \
            -Ifirmware/bsw/mcal/Pwm/include \
            -Ifirmware/bsw/mcal/Dio/include \
            -Ifirmware/bsw/mcal/Gpt/include \
            -Ifirmware/bsw/mcal/Spi/include \
            -Ifirmware/bsw/mcal/Uart/include \
            -Ifirmware/bsw/os/include \
            -Ifirmware/platform/posix/include \
            -Ifirmware/lib/vendor/unity \
            -o test_com \
            test/unit/bsw/test_Com_asild.c \
            test/unit/bsw/stubs_com_test.c \
            firmware/bsw/services/Com/src/Com.c \
            firmware/bsw/services/E2E/src/E2E.c \
            firmware/lib/vendor/unity/unity.c
          ./test_com

      - name: Build and run CanSM tests
        run: |
          gcc -DPLATFORM_POSIX -DUNIT_TEST -g -O0 -Wall \
            -Ifirmware/bsw/include \
            -Ifirmware/bsw/services/CanSM/include \
            -Ifirmware/bsw/services/Det/include \
            -Ifirmware/lib/vendor/unity \
            -o test_cansm \
            test/unit/bsw/test_CanSM_asild.c \
            firmware/bsw/services/CanSM/src/CanSM.c \
            firmware/lib/vendor/unity/unity.c
          ./test_cansm

      - name: Build and run E2E SM tests
        run: |
          gcc -DPLATFORM_POSIX -DUNIT_TEST -g -O0 -Wall \
            -Ifirmware/bsw/include \
            -Ifirmware/bsw/services/E2E/include \
            -Ifirmware/bsw/services/Det/include \
            -Ifirmware/bsw/services/Dem/include \
            -Ifirmware/bsw/services/SchM/include \
            -Ifirmware/lib/vendor/unity \
            -o test_e2e_sm \
            test/unit/bsw/test_E2E_Sm_asild.c \
            test/unit/bsw/stubs_com_test.c \
            firmware/bsw/services/E2E/src/E2E.c \
            firmware/lib/vendor/unity/unity.c
          ./test_e2e_sm

      - name: Build and run Com Signal Packing tests (273)
        run: |
          INC="-Ifirmware/bsw/include -Ifirmware/bsw/services/Com/include -Ifirmware/bsw/services/Det/include -Ifirmware/bsw/services/Dem/include -Ifirmware/bsw/services/E2E/include -Ifirmware/bsw/services/SchM/include -Ifirmware/bsw/services/WdgM/include -Ifirmware/bsw/services/BswM/include -Ifirmware/bsw/services/NvM/include -Ifirmware/bsw/rte/include -Ifirmware/bsw/ecual/PduR/include -Ifirmware/bsw/ecual/CanIf/include -Ifirmware/bsw/ecual/IoHwAb/include -Ifirmware/bsw/mcal/Can/include -Ifirmware/bsw/mcal/Spi/include -Ifirmware/bsw/mcal/Adc/include -Ifirmware/bsw/mcal/Dio/include -Ifirmware/bsw/mcal/Gpt/include -Ifirmware/bsw/mcal/Pwm/include -Ifirmware/bsw/mcal/Uart/include -Ifirmware/ecu/cvc/include -Ifirmware/ecu/cvc/cfg -Ifirmware/ecu/cvc/cfg/platform_posix -Ifirmware/lib/vendor/unity"
          gcc -DPLATFORM_POSIX -DUNIT_TEST -g -O0 -std=c99 -Wno-unused-function -Wno-unused-variable \
            $INC -o test_signals \
            test/unit/bsw/test_Com_signals_generated.c \
            firmware/bsw/services/Com/src/Com.c \
            firmware/bsw/services/E2E/src/E2E.c \
            firmware/bsw/services/E2E/src/E2E_Sm.c \
            test/unit/bsw/stubs_com_test.c \
            firmware/ecu/cvc/cfg/Com_Cfg_Cvc.c \
            firmware/lib/vendor/unity/unity.c
          ./test_signals

      - name: Build and run Com Negative tests (52)
        run: |
          INC="-Ifirmware/bsw/include -Ifirmware/bsw/services/Com/include -Ifirmware/bsw/services/Det/include -Ifirmware/bsw/services/Dem/include -Ifirmware/bsw/services/E2E/include -Ifirmware/bsw/services/SchM/include -Ifirmware/bsw/services/WdgM/include -Ifirmware/bsw/services/BswM/include -Ifirmware/bsw/services/NvM/include -Ifirmware/bsw/services/Dcm/include -Ifirmware/bsw/services/CanTp/include -Ifirmware/bsw/services/CanSM/include -Ifirmware/bsw/services/FiM/include -Ifirmware/bsw/services/Xcp/include -Ifirmware/bsw/services/Sil/include -Ifirmware/bsw/rte/include -Ifirmware/bsw/ecual/PduR/include -Ifirmware/bsw/ecual/CanIf/include -Ifirmware/bsw/ecual/IoHwAb/include -Ifirmware/bsw/mcal/Can/include -Ifirmware/bsw/mcal/Spi/include -Ifirmware/bsw/mcal/Adc/include -Ifirmware/bsw/mcal/Dio/include -Ifirmware/bsw/mcal/Gpt/include -Ifirmware/bsw/mcal/Pwm/include -Ifirmware/bsw/mcal/Uart/include -Ifirmware/ecu/cvc/include -Ifirmware/ecu/cvc/cfg -Ifirmware/ecu/cvc/cfg/platform_posix -Ifirmware/lib/vendor/unity"
          gcc -DPLATFORM_POSIX -DUNIT_TEST -g -O0 -std=c99 -Wno-unused-function -Wno-unused-variable \
            $INC -o test_com_neg \
            test/unit/bsw/test_Com_negative_generated.c \
            firmware/bsw/services/Com/src/Com.c \
            firmware/lib/vendor/unity/unity.c
          ./test_com_neg

      - name: Build and run E2E Message tests (100)
        run: |
          INC="-Ifirmware/bsw/include -Ifirmware/bsw/services/E2E/include -Ifirmware/bsw/services/Det/include -Ifirmware/bsw/services/Dem/include -Ifirmware/bsw/services/SchM/include -Ifirmware/lib/vendor/unity"
          gcc -DPLATFORM_POSIX -DUNIT_TEST -g -O0 -std=c99 -Wno-unused-function -Wno-unused-variable \
            $INC -o test_e2e_msg \
            test/unit/bsw/test_E2E_messages_generated.c \
            firmware/bsw/services/E2E/src/E2E.c \
            firmware/bsw/services/Det/src/Det.c \
            firmware/lib/vendor/unity/unity.c
          ./test_e2e_msg

      - name: Build and run XCP Security tests (33)
        run: |
          INC="-Ifirmware/bsw/include -Ifirmware/bsw/services/Xcp/include -Ifirmware/bsw/services/Det/include -Ifirmware/bsw/services/Dem/include -Ifirmware/bsw/ecual/PduR/include -Ifirmware/bsw/services/SchM/include -Ifirmware/ecu/cvc/include -Ifirmware/ecu/cvc/cfg -Ifirmware/lib/vendor/unity"
          gcc -DPLATFORM_POSIX -DUNIT_TEST -g -O0 -std=c99 -Wno-unused-function -Wno-unused-variable \
            $INC -o test_xcp \
            test/unit/bsw/test_XCP_security_generated.c \
            firmware/bsw/services/Xcp/src/Xcp.c \
            firmware/lib/vendor/unity/unity.c
          ./test_xcp

      - name: Build and run VSM Transition tests (107)
        run: |
          INC="-Ifirmware/bsw/include -Ifirmware/bsw/services/Com/include -Ifirmware/bsw/services/Det/include -Ifirmware/bsw/services/Dem/include -Ifirmware/bsw/services/E2E/include -Ifirmware/bsw/services/SchM/include -Ifirmware/bsw/services/WdgM/include -Ifirmware/bsw/services/BswM/include -Ifirmware/bsw/rte/include -Ifirmware/bsw/ecual/PduR/include -Ifirmware/bsw/ecual/CanIf/include -Ifirmware/bsw/ecual/IoHwAb/include -Ifirmware/bsw/mcal/Can/include -Ifirmware/bsw/mcal/Spi/include -Ifirmware/bsw/mcal/Adc/include -Ifirmware/bsw/mcal/Dio/include -Ifirmware/bsw/mcal/Gpt/include -Ifirmware/bsw/mcal/Pwm/include -Ifirmware/ecu/cvc/include -Ifirmware/ecu/cvc/cfg -Ifirmware/ecu/cvc/cfg/platform_posix -Ifirmware/lib/vendor/unity"
          gcc -DPLATFORM_POSIX -DUNIT_TEST -g -O0 -std=c99 -Wno-unused-function -Wno-unused-variable \
            $INC -o test_vsm \
            test/unit/bsw/test_VSM_transitions_generated.c \
            firmware/lib/vendor/unity/unity.c
          ./test_vsm

      - name: Build and run CanSM Full tests (32)
        run: |
          gcc -DPLATFORM_POSIX -DUNIT_TEST -g -O0 -std=c99 -Wno-unused-function -Wno-unused-variable \
            -Ifirmware/bsw/include -Ifirmware/bsw/services/CanSM/include -Ifirmware/bsw/services/Det/include \
            -Ifirmware/lib/vendor/unity \
            -o test_cansm_full \
            test/unit/bsw/test_CanSM_full_generated.c \
            firmware/bsw/services/CanSM/src/CanSM.c \
            firmware/lib/vendor/unity/unity.c
          ./test_cansm_full

      - name: Build and run E2E SM Full tests (41)
        run: |
          gcc -DPLATFORM_POSIX -DUNIT_TEST -g -O0 -std=c99 -Wno-unused-function -Wno-unused-variable \
            -Ifirmware/bsw/include -Ifirmware/bsw/services/E2E/include -Ifirmware/bsw/services/Det/include \
            -Ifirmware/lib/vendor/unity \
            -o test_e2e_sm_full \
            test/unit/bsw/test_E2E_SM_full_generated.c \
            firmware/bsw/services/E2E/src/E2E_Sm.c \
            firmware/lib/vendor/unity/unity.c
          ./test_e2e_sm_full

      - name: Build and run E2E Negative tests (45)
        run: |
          gcc -DPLATFORM_POSIX -DUNIT_TEST -g -O0 -std=c99 -Wno-unused-function -Wno-unused-variable \
            -Ifirmware/bsw/include -Ifirmware/bsw/services/E2E/include -Ifirmware/bsw/services/Det/include \
            -Ifirmware/bsw/services/Dem/include -Ifirmware/bsw/services/SchM/include \
            -Ifirmware/lib/vendor/unity \
            -o test_e2e_neg \
            test/unit/bsw/test_E2E_negative_generated.c \
            firmware/bsw/services/E2E/src/E2E.c \
            firmware/bsw/services/E2E/src/E2E_Sm.c \
            firmware/lib/vendor/unity/unity.c
          ./test_e2e_neg

      - name: Build and run Dem tests (22)
        run: |
          INC="-Ifirmware/bsw/include -Ifirmware/bsw/services/Dem/include -Ifirmware/bsw/services/Det/include -Ifirmware/bsw/services/NvM/include -Ifirmware/bsw/services/SchM/include -Ifirmware/bsw/ecual/PduR/include -Ifirmware/lib/vendor/unity"
          gcc -DPLATFORM_POSIX -DUNIT_TEST -g -O0 -std=c99 -Wno-unused-function -Wno-unused-variable \
            $INC -o test_dem \
            test/unit/bsw/test_Dem_generated.c \
            firmware/bsw/services/Dem/src/Dem.c \
            firmware/bsw/services/Det/src/Det.c \
            firmware/bsw/services/SchM/src/SchM.c \
            firmware/lib/vendor/unity/unity.c
          ./test_dem

      - name: Build and run Det tests (14)
        run: |
          gcc -DPLATFORM_POSIX -DUNIT_TEST -g -O0 -std=c99 -Wno-unused-function -Wno-unused-variable \
            -Ifirmware/bsw/include -Ifirmware/bsw/services/Det/include -Ifirmware/lib/vendor/unity \
            -o test_det \
            test/unit/bsw/test_Det_generated.c \
            firmware/bsw/services/Det/src/Det.c \
            firmware/lib/vendor/unity/unity.c
          ./test_det

      - name: Build and run WdgM tests (19)
        run: |
          INC="-Ifirmware/bsw/include -Ifirmware/bsw/services/WdgM/include -Ifirmware/bsw/services/Det/include -Ifirmware/bsw/services/Dem/include -Ifirmware/bsw/services/SchM/include -Ifirmware/bsw/ecual/IoHwAb/include -Ifirmware/bsw/mcal/Dio/include -Ifirmware/lib/vendor/unity"
          gcc -DPLATFORM_POSIX -DUNIT_TEST -g -O0 -std=c99 -Wno-unused-function -Wno-unused-variable \
            $INC -o test_wdgm \
            test/unit/bsw/test_WdgM_generated.c \
            firmware/bsw/services/WdgM/src/WdgM.c \
            firmware/bsw/services/Det/src/Det.c \
            firmware/bsw/services/SchM/src/SchM.c \
            firmware/lib/vendor/unity/unity.c
          ./test_wdgm

      - name: Build and run FiM tests (13)
        run: |
          INC="-Ifirmware/bsw/include -Ifirmware/bsw/services/FiM/include -Ifirmware/bsw/services/Det/include -Ifirmware/bsw/services/Dem/include -Ifirmware/bsw/services/SchM/include -Ifirmware/lib/vendor/unity"
          gcc -DPLATFORM_POSIX -DUNIT_TEST -g -O0 -std=c99 -Wno-unused-function -Wno-unused-variable \
            $INC -o test_fim \
            test/unit/bsw/test_FiM_generated.c \
            firmware/bsw/services/FiM/src/FiM.c \
            firmware/bsw/services/Det/src/Det.c \
            firmware/bsw/services/SchM/src/SchM.c \
            firmware/lib/vendor/unity/unity.c
          ./test_fim

      - name: Build and run Rte tests (18)
        run: |
          INC="-Ifirmware/bsw/include -Ifirmware/bsw/rte/include -Ifirmware/bsw/services/Det/include -Ifirmware/bsw/services/WdgM/include -Ifirmware/bsw/services/Dem/include -Ifirmware/bsw/services/SchM/include -Ifirmware/bsw/ecual/IoHwAb/include -Ifirmware/bsw/mcal/Dio/include -Ifirmware/lib/vendor/unity"
          gcc -DPLATFORM_POSIX -DUNIT_TEST -g -O0 -std=c99 -Wno-unused-function -Wno-unused-variable \
            $INC -o test_rte \
            test/unit/bsw/test_Rte_generated.c \
            firmware/bsw/rte/src/Rte.c \
            firmware/bsw/services/Det/src/Det.c \
            firmware/bsw/services/SchM/src/SchM.c \
            firmware/lib/vendor/unity/unity.c
          ./test_rte

  # -------------------------------------------------------------------
  # Traceability Matrix (non-blocking, generates report)
  # -------------------------------------------------------------------
  traceability:
    name: Traceability Matrix
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: '3.12'
      - name: Generate traceability matrix
        run: python tools/trace/gen_traceability_matrix.py
      - name: Post summary
        if: always()
        run: |
          echo "## Traceability" >> "$GITHUB_STEP_SUMMARY"
